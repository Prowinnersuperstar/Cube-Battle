<script>
const frames=${frameJson};
const canv=document.getElementById('c');
const ctx=canv.getContext('2d');
let curFrame=0,playing=true,speed=1;
let lastTs=0;

// FIX 2: frameDur corrected to match actual recording interval.
// Game records every 3rd frame at ~60fps => 3 * (1000/60) ≈ 50ms per frame.
// Old value was 100ms which made replay play at half real speed.
const frameDur=50;

const scrub=document.getElementById('scrub');
scrub.max=Math.max(0,frames.length-1);

function setSpeed(s){
  speed=s;
  ['sp1','sp2','sp4'].forEach(id=>{let el=document.getElementById(id);if(el)el.className='sp';});
  let map={0.5:'sp1',1:'sp2',2:'sp4'};
  if(map[s]){let el=document.getElementById(map[s]);if(el)el.className='sp on';}
}

function togglePlay(){
  playing=!playing;
  document.getElementById('btn-pp').innerText=playing?'⏸ Pause':'▶ Play';
  document.getElementById('btn-pp').style.background=playing?'#27ae60':'#2980b9';
  if(playing){lastTs=0;requestAnimationFrame(tick);}
}

function restartReplay(){
  curFrame=0; playing=true; lastTs=0;
  document.getElementById('btn-pp').innerText='⏸ Pause';
  document.getElementById('btn-pp').style.background='#27ae60';
  requestAnimationFrame(tick);
}

function scrubTo(v){
  curFrame=parseInt(v);
  if(frames[curFrame]) drawFrame(frames[curFrame]);
  document.getElementById('frame-info').innerText=(curFrame+1)+' / '+frames.length;
}

function tick(ts){
  if(!playing) return;
  // FIX 2: correct speed multiplier — advance a frame when enough time has passed
  // at 1x speed: advance every 50ms; at 2x: every 25ms; at 0.5x: every 100ms
  let elapsed = lastTs ? (ts - lastTs) : 0;
  lastTs = ts;
  let framesToAdvance = elapsed > 0 ? Math.floor(elapsed / (frameDur / speed)) : 1;
  // clamp so we don't skip too many frames at once
  framesToAdvance = Math.max(1, Math.min(framesToAdvance, Math.ceil(speed) + 1));

  curFrame += framesToAdvance;
  if(curFrame >= frames.length){
    curFrame = frames.length - 1;
    if(frames[curFrame]) drawFrame(frames[curFrame]);
    scrub.value = curFrame;
    document.getElementById('frame-info').innerText = (curFrame+1)+' / '+frames.length;
    playing = false;
    document.getElementById('btn-pp').innerText = '▶ Play';
    document.getElementById('btn-pp').style.background = '#2980b9';
    return;
  }
  if(frames[curFrame]) drawFrame(frames[curFrame]);
  scrub.value = curFrame;
  document.getElementById('frame-info').innerText = (curFrame+1)+' / '+frames.length;
  requestAnimationFrame(tick);
}

function drawFrame(f){
  ctx.clearRect(0,0,360,360);
  ctx.fillStyle='#2a2a3a';ctx.fillRect(0,0,360,360);
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let i=40;i<360;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,360);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(360,i);ctx.stroke();}

  for(let e of f.ehEg||[]){
    ctx.save();
    let pulse=0.5+0.5*Math.sin(Date.now()/180);
    ctx.fillStyle="#f39c12";ctx.shadowColor="#e67e22";ctx.shadowBlur=8*pulse;
    ctx.beginPath();ctx.ellipse(e.x,e.y,8,10,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#e67e22";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(e.x,e.y,8,10,0,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=pulse*0.9;ctx.fillStyle="#fff";
    ctx.beginPath();ctx.arc(e.x-2,e.y-3,2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  }
  for(let c of f.ehCar||[]){
    ctx.save();
    ctx.fillStyle="#e67e22";ctx.shadowColor="#e67e22";ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(c.x,c.y+10);ctx.lineTo(c.x-9,c.y-9);ctx.lineTo(c.x+9,c.y-9);ctx.closePath();ctx.fill();
    ctx.fillStyle="#27ae60";
    ctx.beginPath();ctx.arc(c.x-3,c.y-13,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.x+3,c.y-13,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.x,c.y-16,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  for(let e of f.eg||[]){
    ctx.save();
    let pulse=e.prog>0.8?(0.5+0.5*Math.sin(Date.now()/70)):1;
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#ffe082';ctx.beginPath();ctx.ellipse(e.x,e.y,9,11.25,0,0,Math.PI*2);ctx.fill();
    if(e.hp<=1){ctx.strokeStyle='#795548';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(e.x-2,e.y-4);ctx.lineTo(e.x+2,e.y);ctx.lineTo(e.x-1,e.y+4);ctx.stroke();}
    ctx.globalAlpha=1;
    let prog=1-Math.min(1,Math.max(0,e.prog));
    ctx.fillStyle='#222';ctx.fillRect(e.x-9,e.y+13,18,3);
    ctx.fillStyle='#4caf50';ctx.fillRect(e.x-9,e.y+13,18*prog,3);
    ctx.restore();
  }

  for(let cl of f.cl||[]){
    ctx.save();ctx.globalAlpha=0.78;
    ctx.fillStyle=cl.c;ctx.fillRect(cl.x-cl.s/2,cl.y-cl.s/2,cl.s,cl.s);
    ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.strokeRect(cl.x-cl.s/2,cl.y-cl.s/2,cl.s,cl.s);ctx.restore();
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='8px Arial';ctx.textAlign='center';
    ctx.fillText('clone',cl.x,cl.y-cl.s/2-2);ctx.textAlign='left';
  }

  for(let h of f.ht||[]){
    if(h.t==='Stick'){
      let len=26,sx=h.x+Math.cos(h.angle)*len,sy=h.y+Math.sin(h.angle)*len;
      ctx.strokeStyle='yellow';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(h.x,h.y);ctx.lineTo(sx,sy);ctx.stroke();
    }
    ctx.save();ctx.globalAlpha=0.88;
    ctx.fillStyle=h.c;ctx.fillRect(h.x-h.s/2,h.y-h.s/2,h.s,h.s);
    ctx.strokeStyle='rgba(255,159,197,0.9)';ctx.lineWidth=1.5;ctx.setLineDash([2,2]);
    ctx.strokeRect(h.x-h.s/2,h.y-h.s/2,h.s,h.s);ctx.restore();
    ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='7px Arial';ctx.textAlign='center';
    ctx.fillText(h.t.substring(0,3),h.x,h.y-h.s/2-2);
    ctx.fillStyle='#fff';ctx.font='8px Arial';
    ctx.fillText(h.hp+'hp',h.x,h.y+4);ctx.textAlign='left';
  }

  drawCubeR(f.p);
  drawCubeR(f.o);
}

function drawCubeR(cb){
  if(!cb)return;
  ctx.setLineDash([]);

  if(cb.t==='Zigzag'&&cb.tr&&cb.tr.length>1){
    ctx.save();
    ctx.strokeStyle=cb.m?'rgba(255,215,0,0.5)':'rgba(0,255,153,0.5)';
    ctx.lineWidth=3;ctx.shadowColor=cb.m?'#ffd700':'#00ff99';ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(cb.tr[0].x,cb.tr[0].y);
    for(let i=1;i<cb.tr.length;i++)ctx.lineTo(cb.tr[i].x,cb.tr[i].y);
    ctx.stroke();ctx.restore();
  }

  if(cb.swap){
    ctx.save();ctx.strokeStyle='rgba(255,111,0,0.9)';ctx.lineWidth=3;
    ctx.shadowColor='#ff6f00';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+8,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  if(cb.swapB){
    ctx.save();ctx.strokeStyle='rgba(255,215,0,0.95)';ctx.lineWidth=4;
    ctx.shadowColor='#ffd700';ctx.shadowBlur=22;
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+14,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  if(cb.stop){
    ctx.save();ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=4;
    ctx.shadowColor='#fff';ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+12,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText('STOP',cb.x,cb.y+4);ctx.textAlign='left';ctx.restore();
  }

  if(cb.t==='Predictor'){
    ctx.save();
    if(cb.pm==='scared'){
      ctx.strokeStyle='rgba(255,255,100,0.7)';ctx.lineWidth=3;ctx.shadowColor='#ffff66';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+11,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(255,255,100,0.9)';ctx.font='bold 11px Arial';ctx.textAlign='center';
      ctx.fillText('Scared!',cb.x,cb.y-cb.s/2-16);
    } else {
      ctx.strokeStyle='rgba(200,80,255,0.7)';ctx.lineWidth=3;ctx.shadowColor='#cc44ff';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+11,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(200,80,255,0.9)';ctx.font='bold 11px Arial';ctx.textAlign='center';
      ctx.fillText('Predicting...',cb.x,cb.y-cb.s/2-16);
    }
    ctx.textAlign='left';ctx.restore();
  }

  if(cb.t==='Evolver'){
    let stageColors=['','#43a047','#7cb342','#f9a825','#e64a19','#b71c1c'];
    cb.c=stageColors[cb.es]||cb.c;
    if(cb.es===5){ctx.save();ctx.shadowColor='#f44336';ctx.shadowBlur=22;ctx.fillStyle=cb.c;ctx.fillRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);ctx.restore();}
    let sl=['','S1','S2','S3','S4','*S5'];
    ctx.fillStyle=cb.es===5?'#ffd700':'#fff';ctx.font='bold '+(cb.es===5?'12':'10')+'px Arial';ctx.textAlign='center';
    ctx.fillText(sl[cb.es],cb.x,cb.y-cb.s/2-18);ctx.textAlign='left';
  }

  if(cb.t==='Rebirth'&&cb.rb){
    ctx.save();ctx.globalAlpha=0.45;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s*1.2,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  if(cb.m){
    ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=16;
    ctx.fillStyle=cb.c;ctx.fillRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);ctx.restore();
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.strokeRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);
  } else {
    ctx.fillStyle=cb.c;ctx.fillRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);
  }

  if(cb.t==='Normal'&&cb.m&&cb.ms>0){
    ctx.save();ctx.strokeStyle='rgba(255,215,0,0.85)';ctx.lineWidth=3;
    ctx.shadowColor='#ffd700';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+9,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  if(cb.t==='Stick'){
    let len=70,sx=cb.x+Math.cos(cb.angle)*len,sy=cb.y+Math.sin(cb.angle)*len;
    ctx.strokeStyle=cb.m?'#ffd700':'yellow';ctx.lineWidth=5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(cb.x,cb.y);ctx.lineTo(sx,sy);ctx.stroke();
  }

  if(cb.t==='Shield'){
    ctx.strokeStyle=cb.m?'#ffd700':'cyan';ctx.lineWidth=10;ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(cb.x,cb.y,55,cb.angle-0.7,cb.angle+0.7);ctx.stroke();
  }

  ctx.setLineDash([]);
  if(cb.da){ctx.strokeStyle='white';ctx.lineWidth=3;ctx.strokeRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);}

  ctx.fillStyle='#fff';ctx.font='12px Arial';ctx.setLineDash([]);
  ctx.fillText((cb.m?'\\u2B50':'')+cb.t+' '+cb.hp,cb.x-22,cb.y-cb.s/2-5);
}

if(frames.length>0){drawFrame(frames[0]);}
lastTs=0;
