

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cube Battle</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#222;color:#fff;text-align:center;font-family:Arial}
canvas{background:#333;margin:10px auto;display:block}

#topbar{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;padding:10px}
#topbar button{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold}
#btn-player{background:#c0392b;color:#fff}
#btn-enemy{background:#2980b9;color:#fff}
#btn-start{background:#27ae60;color:#fff}
#btn-restart{background:#555;color:#fff}
#btn-mastery{background:#b8860b;color:#fff}

#info{font-size:13px;color:#aaa;margin:2px 0 6px}

/* Modal */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;justify-content:center;align-items:center}
#modal.open{display:flex}
#modal-box{background:#2a2a2a;border:2px solid #555;border-radius:12px;padding:20px;width:320px;max-height:80vh;display:flex;flex-direction:column}
#modal-box h3{margin:0 0 14px;font-size:16px;color:#fff}
#char-list{overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px}
.char-card{display:flex;align-items:center;gap:14px;padding:12px;border-radius:10px;border:2px solid #444;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.char-card:hover{border-color:#fff;background:#3a3a3a}
.char-card.mastered-card{border-color:#ffd700}
.char-card.mastered-card:hover{background:#3a3000}
.char-icon{width:36px;height:36px;border-radius:4px;flex-shrink:0}
.char-info{text-align:left;flex:1}
.char-name{font-weight:bold;font-size:14px}
.char-desc{font-size:11px;color:#aaa;margin-top:2px}
.char-quest{font-size:11px;color:#888;margin-top:3px}
.char-mastery-desc{font-size:11px;color:#7ec8e3;margin-top:3px}
.mini-bar-wrap{background:#444;border-radius:3px;height:5px;margin-top:5px}
.mini-bar{background:#ffd700;border-radius:3px;height:5px}
#modal-cancel{margin-top:14px;padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#modal-cancel:hover{background:#666}

/* Mastery panel */
#mastery-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:center}
#mastery-panel.open{display:flex}
#mastery-box{background:#2a2a2a;border:2px solid #b8860b;border-radius:12px;padding:20px;width:340px;max-height:85vh;display:flex;flex-direction:column;gap:10px}
#mastery-box h3{margin:0;color:#ffd700;font-size:18px}
#mastery-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.m-row{background:#333;border-radius:8px;padding:10px 12px;border:2px solid #444}
.m-row.unlocked{border-color:#ffd700}
.m-title{font-weight:bold;font-size:13px;display:flex;align-items:center;gap:7px}
.m-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.m-quest{font-size:11px;color:#aaa;margin-top:3px}
.m-bar-wrap{background:#444;border-radius:4px;height:7px;margin-top:6px}
.m-bar{background:#ffd700;border-radius:4px;height:7px;transition:width 0.3s}
.m-ability{font-size:11px;color:#7ec8e3;margin-top:5px}
#mastery-close{margin-top:4px;padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#mastery-close:hover{background:#666}
/* Shop */
#shop-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:center}
#shop-panel.open{display:flex}
#shop-box{background:#2a2a2a;border:2px solid #ff9fc5;border-radius:12px;padding:20px;width:340px;max-height:85vh;display:flex;flex-direction:column;gap:10px}
#shop-box h3{margin:0;color:#ff9fc5;font-size:18px;display:flex;justify-content:space-between;align-items:center}
.shop-eggs-badge{color:#ffe082;font-size:14px}
.shop-tabs{display:flex;gap:8px}
.shop-tab{flex:1;padding:8px;background:#333;border:none;border-radius:6px;color:#aaa;cursor:pointer;font-size:13px}
.shop-tab.active{background:#444;color:#fff;border-bottom:2px solid #ff9fc5}
.shop-content{overflow-y:auto;display:flex;flex-direction:column;gap:10px;min-height:80px;padding:4px 0}
.shop-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:2px solid #555;background:#333}
.shop-card.buyable{border-color:#ffe082;cursor:pointer}
.shop-card.buyable:hover{background:#3a3000}
.shop-card.owned{border-color:#4caf50;cursor:default}
.shop-icon{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.shop-info{text-align:left;flex:1}
.shop-name{font-weight:bold;font-size:14px}
.shop-desc{font-size:11px;color:#aaa;margin-top:2px}
.shop-cost{font-size:12px;color:#ffe082;margin-top:3px;font-weight:bold}
#shop-close{padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#shop-close:hover{background:#666}
/* Quest Panel */
#quest-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;justify-content:center;align-items:center}
#quest-panel.open{display:flex}
#quest-box{background:#1a1a2e;border:2px solid #ffd700;border-radius:12px;padding:20px;width:340px;max-height:85vh;display:flex;flex-direction:column;gap:10px}
#quest-box h3{margin:0;color:#ffd700;font-size:18px}
#quest-list{overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.bq-row{background:#2a2a3e;border:2px solid #444;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:4px}
.bq-row.owned{border-color:#ffd700;background:#2a2600}
.bq-name{font-weight:bold;font-size:15px;color:#fff}
.bq-sub{font-size:12px;color:#aaa;margin-top:2px}
.bq-owned{color:#ffd700;font-size:13px;font-weight:bold;margin-top:3px}
.bq-bar-wrap{height:6px;background:#333;border-radius:4px;overflow:hidden;margin-top:4px}
.bq-bar{height:100%;background:#ffd700;border-radius:4px}
#quest-close{padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#quest-close:hover{background:#666}
/* Boss Selection Panel */
#boss-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;justify-content:center;align-items:center}
#boss-panel.open{display:flex}
#boss-box{background:#1a0a0a;border:2px solid #f44336;border-radius:12px;padding:20px;width:340px;max-height:85vh;display:flex;flex-direction:column;gap:10px}
#boss-box h3{margin:0;color:#f44336;font-size:18px}
#boss-list{display:flex;flex-direction:column;gap:10px}
.bcard{background:#2a1010;border:2px solid #554;border-radius:10px;padding:12px;cursor:pointer}
.bcard:hover{background:#3a1818;border-color:#f44336}
.bcard-name{font-size:15px;font-weight:bold;color:#fff}
.bcard-desc{font-size:11px;color:#aaa;margin-top:3px}
.bcard-wins{font-size:11px;color:#ffd700;margin-top:3px}
#boss-close{padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#boss-close:hover{background:#666}
/* Party Picker Panel */
#party-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:101;justify-content:center;align-items:center}
#party-panel.open{display:flex}
#party-box{background:#181818;border:2px solid #f44336;border-radius:12px;padding:20px;width:340px;max-height:90vh;display:flex;flex-direction:column;gap:10px}
#party-box h3{margin:0;color:#f44336;font-size:16px}
#party-slots{display:flex;gap:8px;justify-content:center}
.pslot{width:58px;height:58px;border-radius:10px;border:2px dashed #555;background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:#555;text-align:center;overflow:hidden}
.pslot.filled{border-style:solid}
#party-cube-list{overflow-y:auto;display:flex;flex-direction:column;gap:7px;max-height:280px}
.pccard{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:2px solid #444;background:#2a2a2a;cursor:pointer}
.pccard:hover{background:#333}
.pccard.psel{border-color:#ffd700;background:#2a2600}
.pcicon{width:30px;height:30px;border-radius:6px;flex-shrink:0}
.pcname{font-size:13px;font-weight:bold;color:#fff}
.pcsub{font-size:10px;color:#888;margin-top:1px}
#party-fight-btn{padding:10px;background:#555;border:none;border-radius:8px;color:#ccc;font-size:14px;font-weight:bold;width:100%;cursor:not-allowed}
#party-fight-btn.ready{background:#27ae60;color:#fff;cursor:pointer}
#party-fight-btn.ready:hover{background:#219a52}
#party-cancel{padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#party-cancel:hover{background:#666}

/* ===== REPLAY PANEL ===== */
#replay-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;justify-content:center;align-items:center}
#replay-panel.open{display:flex}
#replay-box{background:#1e2a3a;border:2px solid #4a9eff;border-radius:12px;padding:20px;width:360px;max-height:85vh;display:flex;flex-direction:column;gap:10px}
#replay-box h3{margin:0;color:#4a9eff;font-size:18px}
#replay-tabs{display:flex;gap:8px}
.rtab{flex:1;padding:8px;background:#333;border:none;border-radius:6px;color:#aaa;cursor:pointer;font-size:13px;font-weight:bold}
.rtab.active{background:#1a3a5c;color:#fff;border-bottom:2px solid #4a9eff}
.rtab:hover{background:#2a4a6a;color:#fff}
#replay-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:60px;max-height:55vh;padding-right:2px}
.rcard{background:#2a3a4a;border-radius:8px;padding:10px 12px;border:2px solid #3a5a7a;display:flex;flex-direction:column;gap:5px}
.rcard-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.rcard-title{font-weight:bold;font-size:13px;color:#e0f0ff}
.rcard-meta{font-size:11px;color:#7ab;margin-top:1px}
.rcard-btns{display:flex;gap:6px;margin-top:3px}
.rcard-btns button{flex:1;padding:5px 8px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold;transition:background 0.15s}
.rbtn-watch{background:#27ae60;color:#fff}
.rbtn-watch:hover{background:#2ecc71}
.rbtn-fav{background:#2a3a4a;border:1px solid #666;color:#ffd700}
.rbtn-fav:hover{background:#3a4a5a}
.rbtn-unfav{background:#7a6a00;border:1px solid #ffd700;color:#ffd700}
.rbtn-unfav:hover{background:#9a8a00}
.rcard-empty{text-align:center;color:#556;font-size:13px;padding:24px 12px}
#replay-close{padding:8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#replay-close:hover{background:#555}

/* ── Mobile responsive ── */
#game-wrap{display:inline-block;position:relative}
canvas{touch-action:none}

@media (max-width:420px){
  h2{font-size:16px;margin:8px 0 2px}
  #topbar{gap:5px;padding:6px 4px}
  #topbar button{padding:6px 9px;font-size:11px;border-radius:6px}
  #modal-box{width:92vw;padding:14px}
  #mastery-box,#shop-box{width:92vw;padding:14px}
  #quest-box,#boss-box,#party-box{width:92vw;padding:14px}
  #replay-box{width:92vw;padding:14px}
  #btn-delete-progress{font-size:10px;padding:4px 8px}
}

/* Comments overlay */
#comments-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;align-items:flex-end}
#comments-overlay.open{display:flex}
#comments-box{background:#1a1a2e;border-radius:18px 18px 0 0;width:100%;max-height:68vh;display:flex;flex-direction:column;padding:16px;box-shadow:0 -4px 24px rgba(0,0,0,0.6)}
#comments-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#comments-header h4{margin:0;color:#fff;font-size:15px}
#comments-close-btn{background:#333;border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px}
#comments-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;margin-bottom:12px;min-height:40px;max-height:42vh}
.comment-item{background:#252545;border-radius:10px;padding:9px 13px;color:#ddd;font-size:13px;line-height:1.4}
.comment-time{font-size:10px;color:#777;margin-top:3px}
#comment-input-row{display:flex;gap:8px}
#comment-input{flex:1;background:#2a2a4a;border:1px solid #444;border-radius:10px;color:#fff;padding:10px 13px;font-size:13px;outline:none}
#comment-input:focus{border-color:#4a9eff}
#comment-submit{background:#4a9eff;border:none;border-radius:10px;color:#fff;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:bold}
/* Post button in replay card */
.rbtn-post{background:#ff4500;color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;font-weight:bold}
.rbtn-post:hover{background:#ff6030}
</style>
</head>
<body>

<h2 style="margin:12px 0 4px">⚔️ Cube Battle</h2>
<div id="info">No fighters selected</div>

<div id="topbar">
  <button id="btn-player" onclick="openPicker('player')">🟥 Select Player</button>
  <button id="btn-enemy"  onclick="openPicker('enemy')">🟦 Select Enemy</button>
  <button id="btn-start"  onclick="startOrRestart()">▶ Start Battle</button>
      <button id="btn-autoplay" onclick="toggleAutoplay()" style="background:#555;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;">🔁 Auto: OFF</button>
  <button id="btn-mastery" onclick="openMastery()">⭐ Masteries</button>
  <button id="btn-replay" onclick="openReplays()" style="background:#4a9eff;color:#fff;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold">🎬 Replays</button>
  <button id="btn-shop" style="background:#ff69b4;color:#fff;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold" onclick="openShop()">🛒 Shop</button>
  <button id="btn-quests" onclick="openQuests()" style="background:#b8860b;color:#fff;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold">📋 Quests</button>
  <button id="btn-boss" onclick="openBossPanel()" style="background:#c0392b;color:#fff;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold">⚔️ Boss Fight</button>
</div>
<div style="font-size:13px;margin:2px 0 4px"><span id="egg-display" style="color:#ffe082;font-size:14px;font-weight:bold"></span>
  <button onclick="_sfxMuted=!_sfxMuted;this.textContent=_sfxMuted?'🔇 Muted':'🔊 Sound'" style="background:#335;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-left:8px">🔊 Sound</button><button id="btn-delete-progress" onclick="deleteProgress()" style="background:#6b2b2b;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-left:8px">🗑 Delete Progress</button></div>

<!-- Quest Panel -->
<div id="quest-panel">
  <div id="quest-box">
    <h3>📋 Boss Quests</h3>
    <div id="quest-list"></div>
    <button id="quest-close" onclick="closeQuests()">Close</button>
  </div>
</div>

<!-- Boss Selection Panel -->
<div id="boss-panel">
  <div id="boss-box">
    <h3>⚔️ Boss Fight</h3>
    <p style="margin:0;font-size:12px;color:#aaa">Defeat a boss 3 times to own it! Choose your 3-cube party.</p>
    <div id="boss-list"></div>
    <button id="boss-close" onclick="closeBossPanel()">Close</button>
  </div>
</div>

<!-- Party Picker Panel -->
<div id="party-panel">
  <div id="party-box">
    <h3 id="party-title">⚔️ Choose Your Party (3 cubes)</h3>
    <div id="party-slots">
      <div class="pslot" id="pslot-0">Empty</div>
      <div class="pslot" id="pslot-1">Empty</div>
      <div class="pslot" id="pslot-2">Empty</div>
    </div>
    <div id="party-cube-list"></div>
    <button id="party-fight-btn" onclick="confirmPartyFight()">Fight! (pick 3)</button>
    <button id="party-cancel" onclick="closePartyPanel()">Cancel</button>
  </div>
</div>

<!-- Character Picker -->
<div id="modal">
  <div id="modal-box">
    <h3 id="modal-title">Choose a Fighter</h3>
    <div id="char-list"></div>
    <button id="modal-cancel" onclick="closePicker()">Cancel</button>
  </div>
</div>

<!-- Mastery Panel -->
<div id="mastery-panel">
  <div id="mastery-box">
    <h3>⭐ Masteries</h3>
    <div id="mastery-list"></div>
    <button id="mastery-close" onclick="closeMastery()">Close</button>
  </div>
</div>

<!-- Shop Panel -->
<div id="shop-panel">
  <div id="shop-box">
    <h3>&#x1F6D2; Shop <span id="shop-egg-count" class="shop-eggs-badge">&#x1F95A; 0</span></h3>
    <div class="shop-tabs">
      <button class="shop-tab active" id="tab-normal" onclick="switchShopTab('normal')">Normal</button>
      <button class="shop-tab" id="tab-limited" onclick="switchShopTab('limited')">&#x1F381; Limited</button>
      <button class="shop-tab" id="tab-skins" onclick="switchShopTab('skins')">&#x1F3A8; Skins</button>
    </div>
    <div class="shop-content" id="shop-content"></div>
    <button id="shop-close" onclick="closeShop()">Close</button>
  </div>
</div>


<!-- Replay Panel -->
<div id="replay-panel">
  <div id="replay-box">
    <h3>🎬 Replays</h3>
    <div id="replay-tabs">
      <button class="rtab active" id="rtab-recent" onclick="switchReplayTab('recent')">🕐 Recent</button>
      <button class="rtab" id="rtab-fav" onclick="switchReplayTab('favorites')">⭐ Favorites</button>
    </div>
    <div id="replay-list"></div>
    <button id="replay-close" onclick="closeReplays()">Close</button>
  </div>
</div>


<div id="game-wrap"><canvas id="c" width="360" height="360"></canvas></div>

<script>
// ===== SFX ENGINE =====
let _sfxCtx=null, _sfxMuted=false;
function _sfxInit(){
  if(!_sfxCtx)try{_sfxCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
}
function _sfxPlay(fn){
  if(_sfxMuted)return;
  _sfxInit();
  if(!_sfxCtx)return;
  if(_sfxCtx.state==='suspended')_sfxCtx.resume();
  try{fn(_sfxCtx);}catch(e){}
}
function _sfxBeep(type,freq,dur,vol,rampDown,delay){
  rampDown=rampDown!==false; delay=delay||0;
  _sfxPlay(ctx=>{
    let o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime+delay);
    if(rampDown)g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+dur+0.05);
  });
}
function _sfxNoise(dur,vol){
  _sfxPlay(ctx=>{
    let buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*dur),ctx.sampleRate);
    let d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    let src=ctx.createBufferSource(),g=ctx.createGain();
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    src.buffer=buf; src.connect(g); g.connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime+dur+0.05);
  });
}
const SFX={
  hit:()=>{ _sfxBeep('square',200,0.07,0.15); _sfxNoise(0.05,0.04); },
  death:()=>{ [440,330,220,110].forEach((f,i)=>_sfxBeep('sawtooth',f,0.12,0.2,true,i*0.09)); },
  win:()=>{ [523,659,784,1047].forEach((f,i)=>_sfxBeep('sine',f,0.15,0.22,true,i*0.1)); },
  dragonFire:()=>{ _sfxNoise(0.35,0.2); _sfxBeep('sawtooth',90,0.28,0.1,true,0.05); },
  eggCollect:()=>{ _sfxBeep('sine',880,0.1,0.2); _sfxBeep('sine',1100,0.1,0.18,true,0.08); _sfxBeep('sine',1320,0.12,0.2,true,0.15); },
  phantomIn:()=>{ _sfxBeep('sine',600,0.25,0.13,true,0); _sfxBeep('sine',400,0.22,0.11,true,0.06); },

  } else {

  }

  // 🐉 Dragon visuals

      x.beginPath();
      x.moveTo(this.x+this.s/2,this.y-4);

      x.lineTo(this.x+this.s/2+6,this.y+8);
      x.closePath(); x.fill();
      x.restore();
    }
    let _dNow=Date.now(),_dEl=_dNow-this.dragonFireTimer;
    x.save(); x.font="bold 9px Arial"; x.textAlign="center";
    x.fillStyle="#ff6600";
    x.fillText(_dEl>=this.dragonNextFire?"🔥 ready!":"🔥 "+Math.max(0,(this.dragonNextFire-_dEl)/1000).toFixed(1)+"s",this.x,this.y-this.s/2-20);
    x.textAlign="left"; x.restore();
  }
    x.textAlign="left"; x.restore();
  }

  // 🍬 GUMMY visual — rounded jelly body + shine (drawn over base rect)
  if(this.t==="Gummy"){
    let _gs=this.s,_glx=this.x-_gs/2,_gly=this.y-_gs/2,_gr=_gs*0.28;
    x.save();
    x.fillStyle=this.c; x.shadowColor=this.c; x.shadowBlur=10;
    x.beginPath();
    x.moveTo(_glx+_gr,_gly); x.lineTo(_glx+_gs-_gr,_gly);
    x.arcTo(_glx+_gs,_gly,_glx+_gs,_gly+_gr,_gr);
    x.lineTo(_glx+_gs,_gly+_gs-_gr);
    x.arcTo(_glx+_gs,_gly+_gs,_glx+_gs-_gr,_gly+_gs,_gr);
    x.lineTo(_glx+_gr,_gly+_gs);
    x.arcTo(_glx,_gly+_gs,_glx,_gly+_gs-_gr,_gr);
    x.lineTo(_glx,_gly+_gr);
    x.arcTo(_glx,_gly,_glx+_gr,_gly,_gr);
    x.closePath(); x.fill();
    // Glossy shine
    x.globalAlpha=0.38; x.fillStyle="#ffffff";

      x.fillText(this.gummyState==="half"?"🍬 Half":this.gummyState==="survivor"?"💪 Survivor":"💀 Last",this.x,this.y-this.s/2-28);

  // 🛡 Gummy shield ring

    x.shadowColor="#ffff00"; x.shadowBlur=14;
    x.beginPath(); x.arc(this.x,this.y,this.s/2+9,0,Math.PI*2); x.stroke();

    x.fillText("💫",this.x,this.y-this.s/2-14);
    x.textAlign="left"; x.restore();

  if(this.t==="CubeCubePrank"){

    x.save(); x.font="9px Arial"; x.textAlign="center";
    x.fillStyle="#FF9800";
    x.fillText(_ccpEl>=_ccpCd?"🍌 SPIN!":"🍌 "+Math.max(0,(_ccpCd-_ccpEl)/1000).toFixed(1)+"s",this.x,this.y-this.s/2-18);
    x.textAlign="left"; x.restore();
  }

  // HP label
  x.fillStyle="#fff"; x.font="12px Arial";
  x.fillText((this.mastered?"⭐":"")+this.n+" "+this.hp,this.x-22,this.y-this.s/2-5);

  // Dash flash

move(){
  // 🥷 Ninja dash
  if(this.t=="Ninja"&&!this.dashActive&&Date.now()-this.lastDash>3000){
    let ninjaEnemy=(this===p)?o:(this===o)?p:null;
    if(ninjaEnemy&&checkStopField(ninjaEnemy)){ this.lastDash=Date.now(); return; }
    this.dashActive=true; this.lastDash=Date.now(); SFX.ninjaDash();
    this.vx*=3; this.vy*=3;
    if(!bossMode)masteryProgress.Ninja=Math.min(masteryGoals.Ninja,(masteryProgress.Ninja||0)+1);
    checkMasteries();
    setTimeout(()=>{ this.vx/=3; this.vy/=3; this.dashActive=false; },300);
  }

  // 🎯 Focused Ninja dash (toward enemy, phases through)
  if(this.t=="FocusedNinja"&&!this.dashActive&&Date.now()-this.lastDash>3000){
    let fnEnemy=(this===p)?o:(this===o)?p:null;
    if(!fnEnemy){ this.lastDash=Date.now(); }
    else {
      if(checkStopField(fnEnemy)){ this.lastDash=Date.now(); return; }
      let dx=fnEnemy.x-this.x, dy=fnEnemy.y-this.y;
      let dist=Math.sqrt(dx*dx+dy*dy)||1;
      let spd=Math.sqrt(this.vx**2+this.vy**2)*3||7.5;
      this.vx=(dx/dist)*spd; this.vy=(dy/dist)*spd;
      this.dashActive=true; this.dashThrough=true; this.lastDash=Date.now(); SFX.ninjaDash();
      setTimeout(()=>{
        let s=Math.sqrt(this.vx**2+this.vy**2)||7.5;
        let a=Math.atan2(this.vy,this.vx)+(Math.random()-0.5)*0.5;
        this.vx=Math.cos(a)*(s/3); this.vy=Math.sin(a)*(s/3);
        this.dashActive=false; this.dashThrough=false;
      },300);
    }
  }

  // Normal mastery: shield every 10s
  if(this.t=="Normal"&&this.mastered&&Date.now()-this.lastMasteryShield>10000&&this.masteryShield<3){
    this.masteryShield++;
    this.lastMasteryShield=Date.now();
  }

  // 🛑 Stopper: activate stop field every 10s for 1s
  if(this.t=="Stopper"&&!this.stopActive&&Date.now()-this.lastStop>=10000){
    this.stopActive=true; this.lastStop=Date.now();
    setTimeout(()=>{ this.stopActive=false; },1000);
  }
  // Stopper mastery: store a block token every 15s
  if(this.t=="Stopper"&&this.mastered&&!this.masteryBlockReady&&Date.now()-this.lastMasteryBlock>=15000){
    this.masteryBlockReady=true; this.lastMasteryBlock=Date.now();
  }

  // ⚡ Zigzag movement
  if(this.t=="Zigzag"){
    let doZig=true;
    if(this.mastered){
      if(Date.now()-this.zigMasteryTimer>5000){
        this.zigMasteryMode=this.zigMasteryMode==="zigzag"?"normal":"zigzag";
        this.zigMasteryTimer=Date.now();
      }
      doZig=this.zigMasteryMode==="zigzag";
    }
    if(doZig){
      this.zigTimer++;
      if(this.zigTimer>=this.zigInterval){
        this.zigTimer=0;
        let turnAngle=this.zigDir*(Math.PI*0.45);
        this.zigDir*=-1;
        let spd=3.0;
        let ca=Math.atan2(this.vy,this.vx);
        let na=ca+turnAngle;
        this.vx=Math.cos(na)*spd; this.vy=Math.sin(na)*spd;
      }
    }
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12) this.trail.shift();
  }

  // Predictor AI
  if(this.t==="Predictor"){
    let other=(this===p)?o:(this===o)?p:null;
    if(other){
      let nowP=Date.now();
      let dx=other.x-this.x, dy=other.y-this.y;
      let dist=Math.sqrt(dx*dx+dy*dy)||1;
      let atkDur=this.mastered?3000:2000;
      if(this.predMode==="scared"&&nowP-this.predTimer>this.predCooldown){
        let enemyHasAbility=(other.drainActive||other.swapActive||other.stopActive||other.dashActive);
        let hpAdv=this.hp>other.hp;
        let enemyLow=other.hp<=3;
        let safe=enemyLow||(hpAdv&&!enemyHasAbility)||(!enemyHasAbility&&Math.random()<0.25);
        if(safe){ this.predMode="predicting"; this.predModeTimer=nowP; }
        this.predTimer=nowP; this.predCooldown=1500+Math.random()*1000;
      }
      if(this.predMode==="predicting"&&nowP-this.predModeTimer>atkDur){
        this.predMode="scared"; this.predTimer=nowP; this.predCooldown=1200+Math.random()*800;
      }
      let spd=(this.mastered&&this.predMode==="predicting")?4.5:3.0;
      let tvx,tvy;
      if(this.predMode==="scared"){
        let wallRange=90, wx=0, wy=0;
        if(this.x<wallRange) wx+=(wallRange-this.x)/wallRange*2.5;
        if(this.x>360-wallRange) wx-=(this.x-(360-wallRange))/wallRange*2.5;
        if(this.y<wallRange) wy+=(wallRange-this.y)/wallRange*2.5;
        if(this.y>360-wallRange) wy-=(this.y-(360-wallRange))/wallRange*2.5;
        let fx=-dx/dist+wx, fy=-dy/dist+wy;
        let flen=Math.sqrt(fx*fx+fy*fy)||1;
        tvx=(fx/flen)*spd; tvy=(fy/flen)*spd;
      } else {
        tvx=(dx/dist)*spd; tvy=(dy/dist)*spd;
        let hwA=this.s/2+5;
        if(this.x<=hwA&&tvx<0) tvx=Math.abs(tvx);
        if(this.x>=360-hwA&&tvx>0) tvx=-Math.abs(tvx);
        if(this.y<=hwA&&tvy<0) tvy=Math.abs(tvy);
        if(this.y>=360-hwA&&tvy>0) tvy=-Math.abs(tvy);
      }
      this.vx=tvx; this.vy=tvy;
    }
  }

  // 🥚 EGG HUNTER AI
  if(this.t==="EggHunter"){
    let _ehNow=Date.now();
    this.ehBuffs=this.ehBuffs.filter(b=>_ehNow<b.expires);
    if(this.ehBunnyMode&&_ehNow>this.ehBunnyExpires) this.ehBunnyMode=false;
    let _szCnt=this.ehBuffs.filter(b=>b.type==='size').length;
    this.s=Math.min(this.ehBaseS*Math.pow(2,_szCnt),80);
    let _ehEggCnt=this.mastered?3:1;
    if(_ehNow-this.ehEggSpawnTimer>=10000){
      this.ehEggSpawnTimer=_ehNow;
      for(let _i=0;_i<_ehEggCnt;_i++){
        ehEggs.push(new EhEgg(Math.random()*300+30,Math.random()*300+30));
      }
    }
    if(this.mastered&&_ehNow-this.ehCarrotSpawnTimer>=40000){
      this.ehCarrotSpawnTimer=_ehNow;
      ehCarrots.push(new EhCarrot(Math.random()*280+40,Math.random()*280+40));
    }
    let _ehEnemy=(this===p)?o:p;
    let _ehTarget=null;
    if(_ehEnemy&&_ehEnemy.t==="EasterBunny"){
      let _ebOwned=eggs.filter(e=>e.alive&&e.hp>0&&e.owner===_ehEnemy);
      if(_ebOwned.length>0){
        _ehTarget=_ebOwned.reduce((best,e)=>{
          let d=Math.hypot(e.x-this.x,e.y-this.y);
          return(!best||d<Math.hypot(best.x-this.x,best.y-this.y))?e:best;
        },null);
      }
    }
    if(!_ehTarget&&ehEggs.length>0){
      _ehTarget=ehEggs.reduce((best,e)=>{
        let d=Math.hypot(e.x-this.x,e.y-this.y);
        return(!best||d<Math.hypot(best.x-this.x,best.y-this.y))?e:best;
      },null);
    }
    if(!_ehTarget&&this.mastered&&!this.ehBunnyMode&&ehCarrots.length>0){
      _ehTarget=ehCarrots.reduce((best,c)=>{
        let d=Math.hypot(c.x-this.x,c.y-this.y);
        return(!best||d<Math.hypot(best.x-this.x,best.y-this.y))?c:best;
      },null);
    }
    let _spCnt=this.ehBuffs.filter(b=>b.type==='speed').length;
    let _ehSpd=Math.min(3.0*Math.pow(2,_spCnt)*(this.ehBunnyMode?2:1),14);
    if(_ehTarget){
      let _dx=_ehTarget.x-this.x,_dy=_ehTarget.y-this.y,_dd=Math.sqrt(_dx*_dx+_dy*_dy)||1;
      this.vx=(_dx/_dd)*_ehSpd; this.vy=(_dy/_dd)*_ehSpd;
    }
  }

  // 👻 Phantom phase activation
  if(this.t==="Phantom"){
    let _pCd=this.mastered?5000:8000;
    let _pDur=this.mastered?5000:3000;
    let _pNow=Date.now();
    if(!this.phantomActive&&_pNow-this.phantomTimer>=_pCd){
      this.phantomActive=true; this.phantomTimer=_pNow; SFX.phantomIn();
      this.vx*=1.5; this.vy*=1.5;
      let _pSelf=this;
      setTimeout(function(){
        if(_pSelf.hp<=0)return;
        _pSelf.phantomActive=false; _pSelf.phantomTimer=Date.now(); SFX.phantomOut();
        _pSelf.vx/=1.5; _pSelf.vy/=1.5;
        if(_pSelf.mastered){
          _ghostEchoes.push({x:_pSelf.x,y:_pSelf.y,born:Date.now(),s:_pSelf.s,c:_pSelf.c});
        }
      }, _pDur);
    }
  }

  // 🐉 Dragon fire breath
  if(this.t==="Dragon"){
    let _dFNow=Date.now();
    if(_dFNow-this.dragonFireTimer>=this.dragonNextFire){
      this.dragonFireTimer=_dFNow;
      SFX.dragonFire();
      this.dragonNextFire=1000+Math.random()*2000;
      let _dEnemy=(this===p)?o:p;
      let _baseAngle;
      if(this.mastered&&_dEnemy&&_dEnemy.hp>0){
        _baseAngle=Math.atan2(_dEnemy.y-this.y,_dEnemy.x-this.x);
      } else {
        _baseAngle=Math.atan2(this.vy,this.vx)+(Math.random()-0.5)*Math.PI*1.5;
      }
      for(let _di=0;_di<8;_di++){
        let _a=_baseAngle+(Math.random()-0.5)*(this.mastered?0.55:1.4);
        let _spd=2.5+Math.random()*2;
        dragonParticles.push({x:this.x,y:this.y,vx:Math.cos(_a)*_spd,vy:Math.sin(_a)*_spd,born:_dFNow,owner:this,r:5+Math.random()*3});
      }
    }
  }

  // 💫 Stun: freeze position but still bounce walls on stun-end
  if(this.stunUntil && Date.now()<this.stunUntil){ return; }
  this.x+=this.vx; this.y+=this.vy;
  let half=this.s/2;
  if(this.x<=half){this.x=half;this.vx=Math.abs(this.vx);}
  if(this.x>=360-half){this.x=360-half;this.vx=-Math.abs(this.vx);}
  if(this.y<=half){this.y=half;this.vy=Math.abs(this.vy);}
  if(this.y>=360-half){this.y=360-half;this.vy=-Math.abs(this.vy);}
}
}

// ===== CLONE CLASS =====
class Clone {
  constructor(owner, enemy){
    this.owner=owner; this.enemy=enemy;
    this.mastered=owner.mastered;
    this.enemyType=enemy.t;
    this.x=owner.x+(Math.random()-0.5)*24;
    this.y=owner.y+(Math.random()-0.5)*24;
    this.s=20; this.hp=1; this.c=owner.c;
    let ang=Math.random()*Math.PI*2;
    this.vx=Math.cos(ang)*2.5; this.vy=Math.sin(ang)*2.5;
    this.lastHit=0; this.angle=Math.random()*Math.PI*2;
    this.stickTip=null; this.shieldZone=null;
    this.dashActive=false; this.lastDash=Date.now();
    this.zigTimer=0; this.zigInterval=18; this.zigDir=1; this.trail=[];
    this.lastDrain=Date.now(); this.drainActive=false;
  }
  abilType(){ return (!this.mastered||this.enemyType==="Cloner")?"Normal":this.enemyType; }
  move(){
    let at=this.abilType();
    if(at==="Ninja"&&!this.dashActive&&Date.now()-this.lastDash>3000){
      this.dashActive=true; this.lastDash=Date.now(); SFX.ninjaDash();
      this.vx*=3; this.vy*=3;
      setTimeout(()=>{ if(this.hp>0){this.vx/=3;this.vy/=3;} this.dashActive=false; },300);
    }
    if(at==="Zigzag"){
      this.zigTimer++;
      if(this.zigTimer>=this.zigInterval){
        this.zigTimer=0;
        let ta=this.zigDir*(Math.PI*0.45); this.zigDir*=-1;
        let spd=2.5,ca=Math.atan2(this.vy,this.vx),na=ca+ta;
        this.vx=Math.cos(na)*spd; this.vy=Math.sin(na)*spd;
      }
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>8) this.trail.shift();
    }
    this.x+=this.vx; this.y+=this.vy;
    let h=this.s/2;
    if(this.x<=h){this.x=h;this.vx=Math.abs(this.vx);}
    if(this.x>=360-h){this.x=360-h;this.vx=-Math.abs(this.vx);}
    if(this.y<=h){this.y=h;this.vy=Math.abs(this.vy);}
    if(this.y>=360-h){this.y=360-h;this.vy=-Math.abs(this.vy);}
  }
  draw(){
    let at=this.abilType();
    if(at==="Zigzag"&&this.trail.length>1){
      x.save(); x.strokeStyle="rgba(0,255,153,0.35)"; x.lineWidth=2;
      x.beginPath(); x.moveTo(this.trail[0].x,this.trail[0].y);
      for(let i=1;i<this.trail.length;i++) x.lineTo(this.trail[i].x,this.trail[i].y);
      x.stroke(); x.restore();
    }
    if(at==="Stick"){
      this.angle+=0.045;
      let len=28,sx=this.x+Math.cos(this.angle)*len,sy=this.y+Math.sin(this.angle)*len;
      x.strokeStyle="yellow"; x.lineWidth=2;
      x.beginPath(); x.moveTo(this.x,this.y); x.lineTo(sx,sy); x.stroke();
      this.stickTip={x:sx,y:sy};
    } else { this.stickTip=null; }
    if(at==="Shield"){
      this.angle+=0.035; let r=24;
      x.strokeStyle="cyan"; x.lineWidth=4;
      x.beginPath(); x.arc(this.x,this.y,r,this.angle-0.7,this.angle+0.7); x.stroke();
      this.shieldZone={x:this.x+Math.cos(this.angle)*r,y:this.y+Math.sin(this.angle)*r};
    } else { this.shieldZone=null; }
    x.save(); x.globalAlpha=0.78;
    x.fillStyle=this.c;
    x.fillRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
    x.strokeStyle="rgba(255,255,255,0.85)"; x.lineWidth=1.5;
    x.setLineDash([3,3]);
    x.strokeRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
    x.restore();
    if(this.dashActive){ x.strokeStyle="rgba(255,255,255,0.6)"; x.lineWidth=2; x.strokeRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s); }
    x.fillStyle="rgba(255,255,255,0.65)"; x.font="8px Arial";
    x.fillText("clone",this.x-11,this.y-this.s/2-2);
  }
  hits(cube){ return Math.abs(this.x-cube.x)<(this.s+cube.s)/2&&Math.abs(this.y-cube.y)<(this.s+cube.s)/2; }
}

// ===== EGG + HATCHLING SYSTEM =====
const HATCH_TYPES=["Normal","Ninja","Stick","Shield","Vampire","Zigzag","Cloner","Stopper","Predictor","Rebirth"];
const CHAR_COLORS_MAP={Normal:"#c0392b",Ninja:"#2980b9",Stick:"#8B4513",Shield:"#00bcd4",Vampire:"#6a0dad",Zigzag:"#00ff99",Cloner:"#e91e63",Swapper:"#ff6f00",Stopper:"#9e9e9e",Predictor:"#ce93d8",Evolver:"#43a047",Rebirth:"#ff7043"};

class Egg{
  constructor(ex,ey,owner){
    this.x=ex; this.y=ey; this.owner=owner;
    this.hp=2; this.spawnTime=Date.now(); this.s=18; this.alive=true; this.lastHit=0;
  }
  draw(){
    if(!this.alive)return;
    let tl=Math.max(0,5000-(Date.now()-this.spawnTime));
    let pulse=tl<1200?(0.5+0.5*Math.sin(Date.now()/70)):1;
    x.save();
    x.globalAlpha=pulse;
    x.fillStyle="#ffe082";
    x.beginPath(); x.ellipse(this.x,this.y,this.s/2,this.s/2*1.25,0,0,Math.PI*2); x.fill();
    if(this.hp<=1){
      x.strokeStyle="#795548"; x.lineWidth=1;
      x.beginPath(); x.moveTo(this.x-2,this.y-4); x.lineTo(this.x+2,this.y); x.lineTo(this.x-1,this.y+4); x.stroke();
    }
    x.globalAlpha=1;
    let prog=tl/5000;
    x.fillStyle="#222"; x.fillRect(this.x-9,this.y+this.s/2*1.25+3,18,3);
    x.fillStyle="#4caf50"; x.fillRect(this.x-9,this.y+this.s/2*1.25+3,18*prog,3);
    x.restore();
  }
  shouldHatch(){return this.alive&&this.hp>0&&(Date.now()-this.spawnTime)>=5000;}
  hits(cube){return Math.abs(this.x-cube.x)<(this.s/2+cube.s/2)&&Math.abs(this.y-cube.y)<(this.s/2*1.25+cube.s/2);}
}

class Hatchling{
  constructor(type,owner,enemy){
    this.t=type; this.owner=owner; this.enemy=enemy;
    this.hp=6; this.s=20;
    this.c=CHAR_COLORS_MAP[type]||"#ffffff";
    this.x=owner.x+(Math.random()-0.5)*40;
    this.y=owner.y+(Math.random()-0.5)*40;
    this.x=Math.max(this.s/2+2,Math.min(360-this.s/2-2,this.x));
    this.y=Math.max(this.s/2+2,Math.min(360-this.s/2-2,this.y));
    let ang=Math.random()*Math.PI*2;
    this.vx=Math.cos(ang)*2.5; this.vy=Math.sin(ang)*2.5;
    this.angle=Math.random()*Math.PI*2; this.stickTip=null;
    this.lastHit=0; this.dashActive=false; this.lastDash=Date.now();
    this.zigTimer=0; this.zigDir=1; this.trail=[];
  }
  move(){
    if(this.t==="Ninja"&&!this.dashActive&&Date.now()-this.lastDash>3000){
      this.dashActive=true; this.lastDash=Date.now();
      this.vx*=3; this.vy*=3;
      setTimeout(()=>{if(this.hp>0){this.vx/=3;this.vy/=3;}this.dashActive=false;},300);
    }
    if(this.t==="Zigzag"){
      this.zigTimer++;
      if(this.zigTimer>=18){
        this.zigTimer=0;
        let ta=this.zigDir*(Math.PI*0.45); this.zigDir*=-1;
        let spd=2.5,ca=Math.atan2(this.vy,this.vx),na=ca+ta;
        this.vx=Math.cos(na)*spd; this.vy=Math.sin(na)*spd;
      }
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>8)this.trail.shift();
    }
    this.x+=this.vx; this.y+=this.vy;
    let h=this.s/2;
    if(this.x<=h){this.x=h;this.vx=Math.abs(this.vx);}
    if(this.x>=360-h){this.x=360-h;this.vx=-Math.abs(this.vx);}
    if(this.y<=h){this.y=h;this.vy=Math.abs(this.vy);}
    if(this.y>=360-h){this.y=360-h;this.vy=-Math.abs(this.vy);}
  }
  draw(){
    if(this.t==="Zigzag"&&this.trail.length>1){
      x.save(); x.strokeStyle="rgba(0,255,153,0.35)"; x.lineWidth=2;
      x.beginPath(); x.moveTo(this.trail[0].x,this.trail[0].y);
      for(let i=1;i<this.trail.length;i++)x.lineTo(this.trail[i].x,this.trail[i].y);
      x.stroke(); x.restore();
    }
    if(this.t==="Stick"){
      this.angle+=0.045;
      let len=26,sx=this.x+Math.cos(this.angle)*len,sy=this.y+Math.sin(this.angle)*len;
      x.strokeStyle="yellow"; x.lineWidth=2;
      x.beginPath(); x.moveTo(this.x,this.y); x.lineTo(sx,sy); x.stroke();
      this.stickTip={x:sx,y:sy};
    } else {this.stickTip=null;}
    x.save(); x.globalAlpha=0.88;
    x.fillStyle=this.c;
    x.fillRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
    x.strokeStyle="rgba(255,159,197,0.9)"; x.lineWidth=1.5; x.setLineDash([2,2]);
    x.strokeRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
    x.restore();
    x.fillStyle="rgba(255,255,255,0.75)"; x.font="7px Arial"; x.textAlign="center";
    x.fillText(this.t.substring(0,3),this.x,this.y-this.s/2-2);
    x.fillStyle="#fff"; x.font="8px Arial";
    x.fillText(this.hp+"hp",this.x,this.y+4);
    x.textAlign="left";
    if(this.dashActive){x.strokeStyle="rgba(255,255,255,0.6)";x.lineWidth=2;x.strokeRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);}
  }
  hits(cube){return Math.abs(this.x-cube.x)<(this.s+cube.s)/2&&Math.abs(this.y-cube.y)<(this.s+cube.s)/2;}
}

function easterBunnySpawn(bunny,enemy){
  let now=Date.now();
  if(now-bunny.lastEggSpawn<10000)return;
  bunny.lastEggSpawn=now;
  let cnt=bunny.mastered?3:1;
  for(let i=0;i<cnt;i++){
    let ex=bunny.x+(Math.random()-0.5)*24,ey=bunny.y+(Math.random()-0.5)*24;
    ex=Math.max(16,Math.min(344,ex)); ey=Math.max(16,Math.min(344,ey));
    eggs.push(new Egg(ex,ey,bunny));
  }
}

class EhEgg{

function applyEhEggBuff(hunter){ SFX.eggCollect();
  let types=["size","speed","strength","health"];
  let type=types[Math.floor(Math.random()*types.length)];
  let dur=hunter.mastered?10000:5000;
  if(!hunter.mastered){
    hunter.ehBuffs=hunter.ehBuffs.filter(b=>b.type!==type);
  }
  if(type==="health"){
    hunter.hp+=5;
  }
  hunter.ehBuffs.push({type,expires:Date.now()+dur});
  let side=(hunter===p)?selectedPlayer:selectedEnemy;
  if(side==="EggHunter"){
    if(!bossMode)masteryProgress.EggHunter=Math.min(masteryGoals.EggHunter,(masteryProgress.EggHunter||0)+1);
    checkMasteries();
  }
}

function processEhEggs(){
  let surviving=[],now=Date.now();
  for(let eg of ehEggs){
    if(!eg.alive)continue;
    let collected=false;
    for(let hunter of [p,o]){
      if(hunter&&hunter.t==="EggHunter"&&hunter.hp>0&&eg.hits(hunter)){
        eg.alive=false; applyEhEggBuff(hunter); collected=true; break;
      }
    }
    if(!collected){eg.draw();surviving.push(eg);}
  }
  ehEggs=surviving;
}

function processEhCarrots(){
  let surviving=[],now=Date.now();
  for(let c of ehCarrots){
    if(!c.alive)continue;
    let collected=false;
    for(let hunter of [p,o]){

        c.alive=false;
        hunter.ehBunnyMode=true;
        hunter.ehBunnyExpires=Date.now()+15000;
        collected=true; break;
      }

}

function processEggs(){
  let surviving=[],now=Date.now();
  for(let egg of eggs){
    if(!egg.alive||egg.hp<=0)continue;
    let eggEnemy=(egg.owner===p)?o:p;
    if(eggEnemy&&eggEnemy.hp>0&&egg.hits(eggEnemy)&&now-egg.lastHit>500){
      if(eggEnemy.t==="EggHunter"){
        egg.alive=false; applyEhEggBuff(eggEnemy); continue;
      }
      egg.hp--; egg.lastHit=now;
      if(egg.hp<=0){egg.alive=false;continue;}
    }
    if(egg.shouldHatch()){
      egg.alive=false;
      let type=HATCH_TYPES[Math.floor(Math.random()*HATCH_TYPES.length)];
      SFX.eggHatch();
      hatchlings.push(new Hatchling(type,egg.owner,eggEnemy));
      let side=egg.owner===p?selectedPlayer:selectedEnemy;
      if(side==="EasterBunny"){
        if(!bossMode)masteryProgress.EasterBunny=Math.min(masteryGoals.EasterBunny,(masteryProgress.EasterBunny||0)+1);
        checkMasteries();
      }
      x.save(); x.globalAlpha=0.5; x.fillStyle="#ffe082";
      x.beginPath(); x.arc(egg.x,egg.y,28,0,Math.PI*2); x.fill(); x.restore();
      continue;
    }
    egg.draw();
    surviving.push(egg);
  }
  eggs=surviving;
}

function processHatchlings(){
  let surviving=[],now=Date.now();
  for(let h of hatchlings){
    if(h.hp<=0)continue;
    h.move();
    let tgt=h.enemy;
    if(h.stickTip&&tgt&&tgt.hp>0&&now-h.lastHit>400){
      if(Math.abs(h.stickTip.x-tgt.x)<tgt.s/2+5&&Math.abs(h.stickTip.y-tgt.y)<tgt.s/2+5){
        applyDamage(tgt,null,1); h.hp--; h.lastHit=now;
      }
    }
    if(tgt&&tgt.hp>0&&h.hits(tgt)){
      let dxH=tgt.x-h.x,dyH=tgt.y-h.y;
      let dist=Math.sqrt(dxH*dxH+dyH*dyH)||1;
      let nx=dxH/dist,ny=dyH/dist;
      let overlap=(h.s/2+tgt.s/2)-dist;
      if(overlap>0){
        tgt.x+=nx*overlap*0.6; tgt.y+=ny*overlap*0.6;
        h.x-=nx*overlap*0.4; h.y-=ny*overlap*0.4;
      }
      let relV=(h.vx-tgt.vx)*nx+(h.vy-tgt.vy)*ny;
      if(relV>0){ tgt.vx+=relV*nx*0.8; tgt.vy+=relV*ny*0.8; h.vx-=relV*nx*0.5; h.vy-=relV*ny*0.5; }
      if(now-h.lastHit>400){
        if((h.vx*dxH+h.vy*dyH)>0){applyDamage(tgt,null,1);h.hp--;h.lastHit=now;}
        else if((tgt.vx*(h.x-tgt.x)+tgt.vy*(h.y-tgt.y))>0&&h.hp>0){h.hp--;h.lastHit=now;}
      }
    }
    if(h.hp>0){h.draw();surviving.push(h);}
  }
  hatchlings=surviving;
}

function spawnClone(owner,enemy){
  if(clones.filter(c=>c.owner===owner).length>=6) return;
  clones.push(new Clone(owner,enemy));
}

function processClones(){
  clones=clones.filter(cl=>cl.hp>0);
  for(let cl of [...clones]){
    if(cl.hp<=0) continue;
    cl.move();
    let tgt=cl.enemy;
    let now=Date.now();
    if(cl.stickTip&&tgt.hp>0&&now-cl.lastHit>400){
      if(Math.abs(cl.stickTip.x-tgt.x)<tgt.s/2+5&&Math.abs(cl.stickTip.y-tgt.y)<tgt.s/2+5){
        let hit=applyDamage(tgt,null,1);
        if(hit){ tgt.lastHitByClone=true; cl.lastHit=now; }
      }
    }
    if(cl.hits(tgt)&&tgt.hp>0&&now-cl.lastHit>400){
      let dx=tgt.x-cl.x,dy=tgt.y-cl.y;
      let towards=(cl.vx*dx+cl.vy*dy)>0;
      if(towards){
        let hit=applyDamage(tgt,null,1);
        if(hit){ tgt.lastHitByClone=true; cl.lastHit=now; cl.hp=0; }
      }
    }
    if(cl.abilType()==="Vampire"&&!cl.drainActive&&now-cl.lastDrain>10000&&tgt.hp>0){
      cl.drainActive=true; cl.lastDrain=now;
      setTimeout(()=>{
        if(!run||cl.hp<=0) return;
        let steal=Math.min(1,tgt.hp); tgt.hp-=steal; cl.owner.hp+=steal;
        if(steal>0) tgt.lastHitByClone=true;
        cl.drainActive=false;
      },600);
    }
    cl.draw();
  }
}

// ===== HELPERS =====
function collide(a,b){
  return Math.abs(a.x-b.x)<(a.s+b.s)/2&&Math.abs(a.y-b.y)<(a.s+b.s)/2;
}
function bounceOff(a,b){
  let ox=(a.s+b.s)/2-Math.abs(a.x-b.x);
  let oy=(a.s+b.s)/2-Math.abs(a.y-b.y);
  if(ox<oy){let d=a.x<b.x?-1:1;a.x+=d*(ox/2+1);b.x-=d*(ox/2+1);let t=a.vx;a.vx=b.vx;b.vx=t;}
  else{let d=a.y<b.y?-1:1;a.y+=d*(oy/2+1);b.y-=d*(oy/2+1);let t=a.vy;a.vy=b.vy;b.vy=t;}
  function nudge(cube){let spd=Math.sqrt(cube.vx**2+cube.vy**2),ang=Math.atan2(cube.vy,cube.vx)+(Math.random()-0.5)*0.3;cube.vx=Math.cos(ang)*spd;cube.vy=Math.sin(ang)*spd;}
  nudge(a);nudge(b);
}
function movingTowards(a,b){let dx=b.x-a.x,dy=b.y-a.y;return(a.vx*dx+a.vy*dy)>0;}
function hitsShieldArc(shield,px,py){
  let dx=px-shield.x,dy=py-shield.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(Math.abs(dist-55)>18)return false;
  let ang=Math.atan2(dy,dx),diff=ang-shield.angle;
  while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;
  return Math.abs(diff)<0.7;
}

function checkStopField(stopper){
  if(!stopper||stopper.t!=="Stopper") return false;
  if(stopper.stopActive){
    if(!bossMode)masteryProgress.Stopper=Math.min(masteryGoals.Stopper,(masteryProgress.Stopper||0)+1);
    checkMasteries();
    return true;
  }
  if(stopper.mastered&&stopper.masteryBlockReady){
    stopper.masteryBlockReady=false;
    stopper.lastMasteryBlock=Date.now();
    if(!bossMode)masteryProgress.Stopper=Math.min(masteryGoals.Stopper,(masteryProgress.Stopper||0)+1);
    checkMasteries();
    return true;
  }
  return false;
}

function evolverHit(ev){
  if(ev.evolveStage>=5) return;
  ev.evolveHitCount++;
  let needed=ev.mastered?Math.max(1,ev.evolveHitsNeeded-1):ev.evolveHitsNeeded;
  if(ev.evolveHitCount>=needed){
    ev.evolveStage++;
    ev.evolveHitCount=0;
    ev.evolveHitsNeeded++;
    let stageHP=[0,10,11,10,20,30];
    ev.hp=stageHP[ev.evolveStage];
    if(ev.evolveStage===4) ev.s=50;
    if(ev.evolveStage===5){ ev.s=55; if(!bossMode)masteryProgress.Evolver=1; checkMasteries(); }
    ev.evolveFlash=Date.now();
    let hw=ev.s/2+2;
    ev.x=Math.max(hw,Math.min(360-hw,ev.x));
    ev.y=Math.max(hw,Math.min(360-hw,ev.y));
  }
}

function applyDamage(victim,attacker,amount){
  if(victim.t=="Ninja"&&victim.mastered&&victim.dashActive) return false;
  if(victim.t=="Normal"&&victim.mastered&&victim.masteryShield>0){
    victim.masteryShield--;
    return false;
  }
  // Gummy mastery shield check
  if(victim.t==="Gummy"&&victim.mastered&&checkGummyShield(victim,Date.now())) return false;
  victim.hp-=amount;
  SFX.hit();
  if(attacker) victim.lastHitByClone=false;
  if(victim.t==="Evolver") evolverHit(victim);
  if(victim.t==="Cloner"&&run){
    let cloneEnemy=(victim===p)?o:(victim===o)?p:null;
    if(cloneEnemy) spawnClone(victim,cloneEnemy);
  }
  if(attacker&&attacker.t=="Normal"){
    if(!bossMode)masteryProgress.Normal=Math.min(masteryGoals.Normal,(masteryProgress.Normal||0)+amount);
    checkMasteries();
  }
  return true;
}

function stickDamage(stick,enemy){
  if(stick.t!="Stick"||!stick.stickTip)return;
  let tip=stick.stickTip,half=enemy.s/2;
  if(Math.abs(tip.x-enemy.x)<half+6&&Math.abs(tip.y-enemy.y)<half+6){
    let dx=enemy.x-tip.x,dy=enemy.y-tip.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    let spd=Math.sqrt(enemy.vx**2+enemy.vy**2)||2.5;
    enemy.vx=(dx/dist)*spd; enemy.vy=(dy/dist)*spd;
    enemy.x=tip.x+(dx/dist)*(half+8); enemy.y=tip.y+(dy/dist)*(half+8);
    let now=Date.now();
    if(now-enemy.lastHit>400){
      if(checkStopField(enemy)){ enemy.lastHit=now; stick.lastDash=Date.now(); return; }
      let dmg=stick.mastered?3:2;
      let hit=applyDamage(enemy,stick,dmg);
      if(hit){
        if(!bossMode)masteryProgress.Stick=Math.min(masteryGoals.Stick,(masteryProgress.Stick||0)+1);
        checkMasteries();
      }
      enemy.lastHit=now;
    }
  }
}

function vampireDrain(vampire,enemy){
  if(vampire.t!="Vampire")return;
  let now=Date.now();
  let cd=vampire.mastered?8000:15000;
  if(!vampire.drainActive&&now-vampire.lastDrain>cd){
    if(checkStopField(enemy)){ vampire.lastDrain=Date.now(); return; }
    vampire.drainActive=true; vampire.drainTarget=enemy; vampire.lastDrain=now;
    setTimeout(()=>{
      if(!run)return;
      let steal=Math.min(3,enemy.hp);
      enemy.hp-=steal; vampire.hp+=steal;
      vampire.drainActive=false; vampire.drainTarget=null;
      if(!bossMode)masteryProgress.Vampire=Math.min(masteryGoals.Vampire,(masteryProgress.Vampire||0)+steal);
      checkMasteries();
    },1000);
  }
}

function swapperAbility(swapper, enemy){
  if(swapper.t!="Swapper"||swapper.swapActive) return;
  let now=Date.now();
  if(now-swapper.lastSwap<20000) return;
  if(checkStopField(enemy)){ swapper.lastSwap=Date.now(); return; }
  swapper.swapActive=true;
  swapper.lastSwap=now;
  swapper.swapEnemy=enemy;
  enemy.killedDuringSwap=false;
  let tmp=swapper.hp; swapper.hp=enemy.hp; enemy.hp=tmp;
  let savedEnemySwapActive=enemy.swapActive;
  enemy.swapActive=true;
  setTimeout(()=>{
    if(!run) return;
    let t2=swapper.hp; swapper.hp=enemy.hp; enemy.hp=t2;
    swapper.swapActive=false;
    enemy.swapActive=savedEnemySwapActive;
    swapper.swapEnemy=null;
    if(swapper.mastered){
      swapper.swapBoostActive=true;
      let hpBefore=swapper.hp;
      swapper.hp=Math.max(swapper.hp,10);
      let boostedTo=swapper.hp;
      setTimeout(()=>{
        if(!run) return;
        let diff=boostedTo-hpBefore;
        swapper.hp=Math.max(0,swapper.hp-diff);
        swapper.swapBoostActive=false;
      },5000);
    }
  },10000);
}

function handleCombat(a,b){
  if(!collide(a,b))return;
  let now=Date.now();
  let aTo=movingTowards(a,b),bTo=movingTowards(b,a);

  if(b.t=="Shield"&&aTo&&hitsShieldArc(b,a.x,a.y)){
    if(now-a.lastHit>400){
      if(checkStopField(a)){ a.lastHit=now; return; }
      let dmg=b.mastered?2:1;
      applyDamage(a,null,dmg);
      a.lastHit=now;
      if(!bossMode)masteryProgress.Shield=Math.min(masteryGoals.Shield,(masteryProgress.Shield||0)+1);
      checkMasteries();
    }
    return;
  }
  if(a.t=="Shield"&&bTo&&hitsShieldArc(a,b.x,b.y)){
    if(now-b.lastHit>400){
      if(checkStopField(b)){ b.lastHit=now; return; }
      let dmg=a.mastered?2:1;
      applyDamage(b,null,dmg);
      b.lastHit=now;
      if(!bossMode)masteryProgress.Shield=Math.min(masteryGoals.Shield,(masteryProgress.Shield||0)+1);
      checkMasteries();
    }
    return;
  }

  let aNearBStick=b.t=="Stick"&&b.stickTip&&Math.abs(b.stickTip.x-a.x)<a.s/2+10&&Math.abs(b.stickTip.y-a.y)<a.s/2+10;
  let bNearAStick=a.t=="Stick"&&a.stickTip&&Math.abs(a.stickTip.x-b.x)<b.s/2+10&&Math.abs(a.stickTip.y-b.y)<b.s/2+10;

  if(aTo&&!aNearBStick&&now-b.lastHit>400){
    let dmg=1;
    if(a.t==="Predictor"&&a.mastered&&a.predMode==="predicting") dmg=2;
    if(a.t==="Evolver") dmg=a.evolveStage>=5?3:a.evolveStage>=3?2:1;
    if(a.t==="EggHunter"){let sc=a.ehBuffs.filter(b=>now<b.expires&&b.type==="strength").length;if(sc>0)dmg=Math.max(1,Math.round(dmg*Math.pow(2,sc)));}
    if(a.t==="Phantom"&&a.phantomActive){dmg=a.mastered?4:3;if(!bossMode)masteryProgress.Phantom=Math.min(masteryGoals.Phantom,(masteryProgress.Phantom||0)+dmg);checkMasteries();}
    applyDamage(b,a,dmg); b.lastHit=now;
    if(a.t==="Predictor"&&a.predMode==="predicting"){a.predMode="scared";a.predTimer=now;a.predCooldown=1500+Math.random()*1000;}
  }
  if(bTo&&!bNearAStick&&now-a.lastHit>400){
    let dmg=1;
    if(b.t==="Predictor"&&b.mastered&&b.predMode==="predicting") dmg=2;
    if(b.t==="Evolver") dmg=b.evolveStage>=5?3:b.evolveStage>=3?2:1;
    if(b.t==="EggHunter"){let sc=b.ehBuffs.filter(b2=>now<b2.expires&&b2.type==="strength").length;if(sc>0)dmg=Math.max(1,Math.round(dmg*Math.pow(2,sc)));}
    if(b.t==="Phantom"&&b.phantomActive){dmg=b.mastered?4:3;if(!bossMode)masteryProgress.Phantom=Math.min(masteryGoals.Phantom,(masteryProgress.Phantom||0)+dmg);checkMasteries();}
    applyDamage(a,b,dmg); a.lastHit=now;
    if(b.t==="Predictor"&&b.predMode==="predicting"){b.predMode="scared";b.predTimer=now;b.predCooldown=1500+Math.random()*1000;}
  }
}

function checkRebirth(cube){
  if(cube.t!=="Rebirth") return false;
  let maxR=cube.mastered?2:1;
  if(cube.rebirthCount>=maxR) return false;
  cube.rebirthCount++;
  cube.hp=cube.rebirthCount===1?5:2;
  cube.s=cube.rebirthCount===1?26:16;
  cube.rebirthFlash=Date.now();
  let hw=cube.s/2+2;
  cube.x=Math.max(hw,Math.min(360-hw,cube.x));
  cube.y=Math.max(hw,Math.min(360-hw,cube.y));
  let side=(cube===p)?selectedPlayer:selectedEnemy;
  if(side==="Rebirth"){
    if(!bossMode)masteryProgress.Rebirth=Math.min(masteryGoals.Rebirth,(masteryProgress.Rebirth||0)+1);
    checkMasteries();
  }
  return true;
}

function processGhostEchoes(){
  let now=Date.now();
  _ghostEchoes=_ghostEchoes.filter(function(e){return now-e.born<1500;});
  _ghostEchoes.forEach(function(e){
    let prog=(now-e.born)/1500;
    x.save();
    x.globalAlpha=(1-prog)*0.45;
    x.fillStyle=e.c;
    x.shadowColor="#bf00ff"; x.shadowBlur=14;
    x.fillRect(e.x-e.s/2,e.y-e.s/2,e.s,e.s);
    x.globalAlpha=(1-prog)*0.28;
    x.strokeStyle="#bf00ff"; x.lineWidth=1.5;
    x.strokeRect(e.x-e.s/2,e.y-e.s/2,e.s,e.s);
    x.restore();
  });
}

// ===== GAME LOOP =====
function processDragonFire(){
  let _dfNow=Date.now();
  dragonParticles=dragonParticles.filter(function(fp){return _dfNow-fp.born<900;});
  dragonParticles.forEach(function(fp){
    fp.x+=fp.vx; fp.y+=fp.vy;
    let _prog=(_dfNow-fp.born)/900;
    x.save();
    x.globalAlpha=(1-_prog)*0.88;
    x.fillStyle=_prog<0.35?"#ffee00":_prog<0.65?"#ff6600":"#cc2200";
    x.shadowColor="#ff5500"; x.shadowBlur=12;
    x.beginPath(); x.arc(fp.x,fp.y,Math.max(1.5,fp.r*(1-_prog*0.5)),0,Math.PI*2); x.fill();
    x.restore();
    [p,o].forEach(function(cube){
      if(!cube||cube===fp.owner||cube.hp<=0)return;
      let _dx=fp.x-cube.x,_dy=fp.y-cube.y;
      if(Math.sqrt(_dx*_dx+_dy*_dy)<cube.s/2+fp.r){
        cube.burningUntil=Math.max(cube.burningUntil||0,_dfNow+3000);
        if(!cube.lastBurnTick||cube.lastBurnTick===0) cube.lastBurnTick=_dfNow;
      }
    });
  });
  // Burning tick damage
  [p,o].forEach(function(cube){
    if(!cube||cube.hp<=0)return;
    if(cube.burningUntil&&_dfNow<cube.burningUntil){
      if(_dfNow-cube.lastBurnTick>=500){
        cube.hp=Math.max(0,cube.hp-1);
        cube.lastBurnTick=_dfNow;
        let _fireOwner=cube===p?o:p;
        if(_fireOwner&&_fireOwner.t==="Dragon"&&_fireOwner.hp>0){
          if(!bossMode)masteryProgress.Dragon=Math.min(masteryGoals.Dragon,(masteryProgress.Dragon||0)+1);
          checkMasteries();
        }
      }
      // Burn glow on victim
      x.save();
      x.strokeStyle="rgba(255,120,0,0.65)"; x.lineWidth=2.5;
      x.shadowColor="#ff4400"; x.shadowBlur=14;
      x.beginPath(); x.arc(cube.x,cube.y,cube.s/2+7,0,Math.PI*2); x.stroke();
      x.restore();
    }
  });
}


// FIX 1: Delta-time guard so the game runs at consistent speed on all displays
// requestAnimationFrame fires at the display's refresh rate (60, 120, 144Hz, etc.)
// Without this guard, cubes move faster on high-refresh screens.
// We target ~60fps by skipping frames that arrive too soon (< 75% of 16.67ms).
let _lastLoopTs = 0;
const _FRAME_TARGET = 1000 / 60; // ~16.67ms

function loop(ts){
  if(!run) return;
  // Skip if called too soon (high refresh rate display)
  if(ts && _lastLoopTs && (ts - _lastLoopTs) < _FRAME_TARGET * 0.75){
    requestAnimationFrame(loop);
    return;
  }
  _lastLoopTs = ts || performance.now();

  captureFrame();
  x.clearRect(0,0,360,360);
  p.move(); o.move();
  // Boss homing - slowly steers toward player
  if(bossMode&&o&&p){
    let _hx=p.x-o.x,_hy=p.y-o.y,_hd=Math.sqrt(_hx*_hx+_hy*_hy);
    if(_hd>4){o.vx+=(_hx/_hd)*0.14;o.vy+=(_hy/_hd)*0.14;}
    let _hs=Math.sqrt(o.vx*o.vx+o.vy*o.vy),_hmax=4.0;
    if(_hs>_hmax){o.vx=(o.vx/_hs)*_hmax;o.vy=(o.vy/_hs)*_hmax;}
  }
  if(p.t==="CubeCube") updateCubeCubeAbilities(p,[o],c,Date.now());
  if(o.t==="CubeCube") updateCubeCubeAbilities(o,[p],c,Date.now());
  if(p.t==="CubeCubePrank") updateCubeCubePrankAbility(p,[o],c,Date.now());
  if(o.t==="CubeCubePrank") updateCubeCubePrankAbility(o,[p],c,Date.now());
  if(p.t==="Gummy") updateGummyCubeAbility(p,o,Date.now());
  if(o.t==="Gummy") updateGummyCubeAbility(o,p,Date.now());
  applyBananaPeels(p,Date.now()); applyBananaPeels(o,Date.now());
  let _pHpPre=p.hp;
  if(collide(p,o)){
    handleCombat(p,o);
    let _fnThrough=(p.t==="FocusedNinja"&&p.dashThrough)||(o.t==="FocusedNinja"&&o.dashThrough);
    if(!_fnThrough) bounceOff(p,o);
  }
  if(bossMode&&p.hp<_pHpPre)p.hp=Math.max(0,p.hp-1);// boss deals +1 extra
  stickDamage(p,o); stickDamage(o,p);
  vampireDrain(p,o); vampireDrain(o,p);
  swapperAbility(p,o); swapperAbility(o,p);
  if(p&&p.t==="EasterBunny")easterBunnySpawn(p,o);
  if(o&&o.t==="EasterBunny")easterBunnySpawn(o,p);
  processClones();
  processEggs();
  processEhEggs();
  processEhCarrots();
  processHatchlings();
  p.draw(); o.draw();
  // Boss HUD overlay
  if(bossMode&&o&&p){
    let _bdat=BOSSES.find(function(b){return b.type===currentBossType;})||{label:"Boss",color:"#f44336"};
    x.save();
    // Boss HP bar (above boss)
    let _bhp=Math.max(0,o.hp),_bmax=35,_bpct=_bhp/_bmax;
    let _bw=72,_bx2=o.x-36,_by2=o.y-o.s/2-20;
    x.fillStyle="#111";x.fillRect(_bx2,_by2,_bw,8);
    x.fillStyle=_bpct>0.5?"#f44336":_bpct>0.25?"#ff9800":"#ffeb3b";
    x.fillRect(_bx2,_by2,_bw*_bpct,8);
    x.strokeStyle="rgba(255,255,255,0.5)";x.lineWidth=1;x.strokeRect(_bx2,_by2,_bw,8);
    x.font="bold 10px Arial";x.textAlign="center";x.fillStyle=_bdat.color;
    x.shadowColor=_bdat.color;x.shadowBlur=8;
    x.fillText(_bdat.label+" ("+Math.ceil(_bhp)+" HP)",o.x,o.y-o.s/2-24);
    // Boss glow border
    x.shadowColor=_bdat.color;x.shadowBlur=18;
    x.strokeStyle=_bdat.color;x.lineWidth=3;
    x.strokeRect(o.x-o.s/2-4,o.y-o.s/2-4,o.s+8,o.s+8);
    x.restore();
    // Party HUD bottom-left
    x.save();
    x.font="bold 10px Arial";x.textAlign="left";x.fillStyle="#ccc";x.shadowBlur=0;
    x.fillText("Party:",6,354);
    for(let _pi=0;_pi<bossParty.length;_pi++){
      let _pch=CHARS.find(function(cc){return cc.type===bossParty[_pi].type;});
      x.globalAlpha=_pi<bossPartyIdx?0.22:1;
      x.fillStyle=_pch?_pch.color:"#888";
      x.fillRect(46+_pi*25,342,20,16);
      if(_pi===bossPartyIdx){x.strokeStyle="#ffd700";x.lineWidth=2;x.strokeRect(46+_pi*25,342,20,16);}
      x.globalAlpha=1;
    }
    x.restore();
  }
  // Process Gummy partner (after p/o drawn so partner draws on top)
  if(p.t==="Gummy"&&gummyPartner&&gummyPartner.hp>0) processGummyPartner(o,Date.now());
  if(o.t==="Gummy"&&gummyPartner&&gummyPartner.hp>0) processGummyPartner(p,Date.now());
  // Partner absorption: if the main Gummy died but partner lives, partner takes over
  if(p.t==="Gummy"&&p.hp<=0&&gummyPartner&&gummyPartner.hp>0){
    // Partner becomes p
    let _gpc=new Cube("Gummy",gummyPartner.x,gummyPartner.y,p.mastered);
    _gpc.hp=gummyPartner.hp; _gpc.s=gummyPartner.s; _gpc.c=gummyPartner.c;
    _gpc.gummyState="survivor"; _gpc.gummyCanSplit=false; _gpc.vx=gummyPartner.vx; _gpc.vy=gummyPartner.vy;
    if(p.mastered) _gpc.gummyShields=1; // mastery: survivor gets a shield
    gummyPartner=null; p=_gpc;
  }
  // Partner death: main Gummy grows, loses split
  if(p.t==="Gummy"&&p.gummyState==="half"&&gummyPartner&&gummyPartner.hp<=0){
    gummyPartner=null; p.s=Math.min(34,p.s+7); p.gummyState="survivor"; p.gummyCanSplit=false;
    if(p.mastered) p.gummyShields=1;
  }
  processGhostEchoes();
  processDragonFire();
  drawBananaPeels(x,Date.now());
  for(let _cb of [p,o]){
    if(_cb.ccLabel&&Date.now()<_cb.ccLabelEnd){
      let _lc=_cb.t==="CubeCubePrank"?"#FF9800":"#E040FB";
      x.save();x.font="bold 13px sans-serif";x.fillStyle=_lc;x.textAlign="center";
      x.fillText(_cb.ccLabel,_cb.x,_cb.y-_cb.s-8);x.restore();
    }
  }
  if(p.hp<=0) checkRebirth(p);
  if(o.hp<=0) checkRebirth(o);

  if(p.hp<=0||o.hp<=0){
    // ===== BOSS MODE RESULT =====
    if(bossMode){
      if(p.hp<=0&&o.hp>0){
        // Try next party member
        bossPartyIdx++;
        if(bossPartyIdx<bossParty.length){
          clones=[];eggs=[];hatchlings=[];ehEggs=[];ehCarrots=[];_ghostEchoes=[];dragonParticles=[];
          let _np=bossParty[bossPartyIdx];
          p=new Cube(_np.type,80,180,_np.mastered);
          requestAnimationFrame(loop);return;
        }
      }
      // Final result
      bossMode=false;run=false;
      clones=[];eggs=[];hatchlings=[];ehEggs=[];ehCarrots=[];_ghostEchoes=[];dragonParticles=[];gummyPartner=null;window.bananaPeels=[];
      let _playerWon=o.hp<=0;
      if(_playerWon){
        let _bt=activeBossType||currentBossType;
        console.log("[BossWin] Win detected! _bt="+_bt+" bossProgress="+JSON.stringify(bossProgress));
        if(_bt&&bossProgress[_bt]){
          bossProgress[_bt].wins=(bossProgress[_bt].wins||0)+1;
          if(bossProgress[_bt].wins>=3)bossProgress[_bt].owned=true;
          saveBossProgress(); // dedicated save first
          saveProgress();
        } else if(_bt){ // boss type exists but not in bossProgress — add it
          bossProgress[_bt]={wins:1,owned:false};
          saveBossProgress(); // dedicated save first
          saveProgress();
        } else {
          console.warn("[BossWin] WARNING: _bt is null/undefined! activeBossType="+activeBossType+" currentBossType="+currentBossType);
        }
        saveBossProgress(); // extra dedicated save to be safe
        saveProgress(); // extra save to be safe
        activeBossType=null;
        SFX.win();
        let _bdat2=BOSSES.find(function(b){return b.type===_bt;})||{label:"Boss",color:"#ffd700"};
        x.fillStyle="rgba(0,0,0,0.72)";x.fillRect(0,85,360,190);
        x.fillStyle="#ffd700";x.font="bold 26px Arial";x.textAlign="center";
        x.shadowColor="#ffd700";x.shadowBlur=12;
        x.fillText("Boss Defeated! ??",180,150);
        x.shadowBlur=0;
        let _bw2=bossProgress[_bt].wins;
        x.fillStyle="#fff";x.font="16px Arial";
        x.fillText("Wins: "+_bw2+"/3",180,180);

    // ===== NORMAL GAME END =====
    let _replayResult=p.hp<=0&&o.hp<=0?'tie':p.hp>0?'player':'enemy';

// ===== CUBE CUBE ABILITIES =====
function updateCubeCubeAbilities(cube,enemies,canv,now){
  if(!masteryUnlocked.CubeCube) return;
  if(!cube.ccPeelTimer) cube.ccPeelTimer=now+6000+Math.random()*9000;
  if(!cube.ccDashTimer)  cube.ccDashTimer=now+4000+Math.random()*6000;
  if(cube.ccDashing===undefined) cube.ccDashing=false;
  // Banana peel throw
  if(now>=cube.ccPeelTimer){
    cube.ccPeelTimer=now+6000+Math.random()*9000;
    if(!window.bananaPeels) window.bananaPeels=[];
    let count=1+(Math.random()<0.4?1:0);
    for(let i=0;i<count;i++){
      window.bananaPeels.push({x:40+Math.random()*(canv.width-80),y:40+Math.random()*(canv.height-80),born:now,life:10000});
    }
  }
  // Prank dash
  if(!cube.ccDashing&&now>=cube.ccDashTimer){
    cube.ccDashTimer=now+4000+Math.random()*6000;
    cube.ccDashing=true;
    cube.ccDashEnd=now+600;
    let spd=cube.s*5;
    let ang=Math.random()*Math.PI*2;
    cube.ccDashVx=Math.cos(ang)*spd;
    cube.ccDashVy=Math.sin(ang)*spd;
    cube.ccLabel="🎡 PRANK DASH!";
    cube.ccLabelEnd=now+900;
  }
  if(cube.ccDashing){
    if(now>=cube.ccDashEnd){cube.ccDashing=false;}
    else{cube.vx=cube.ccDashVx;cube.vy=cube.ccDashVy;}
  }
}
function applyBananaPeels(cube,now){
  if(!window.bananaPeels) return;
  window.bananaPeels=window.bananaPeels.filter(function(p){return now-p.born<p.life;});
  for(let p of window.bananaPeels){
    let dx=cube.x-p.x,dy=cube.y-p.y;
    if(Math.sqrt(dx*dx+dy*dy)<cube.s+12){
      if(p.stun){
        // Prank peel: 0.5s stun + mild fling
        cube.stunUntil=now+500;
        let a=Math.random()*Math.PI*2;
        cube.vx=Math.cos(a)*cube.s*1.5;
        cube.vy=Math.sin(a)*cube.s*1.5;
      } else {
        // Normal CubeCube peel: fling
        let a=Math.random()*Math.PI*2;
        cube.vx=Math.cos(a)*cube.s*3;
        cube.vy=Math.sin(a)*cube.s*3;
      }
      p.life=0;
    }
  }
}
function drawBananaPeels(ctx,now){
  if(!window.bananaPeels) return;
  ctx.font="18px serif";
  for(let p of window.bananaPeels){
    if(now-p.born<p.life) ctx.fillText("🍌",p.x-9,p.y+7);
  }
}

function updateCubeCubePrankAbility(cube,enemies,canv,now){

    if(!window.bananaPeels) window.bananaPeels=[];
    // Spinning 8-directional peels from cube's current position
    let angles=[0,Math.PI/4,Math.PI/2,3*Math.PI/4,Math.PI,5*Math.PI/4,3*Math.PI/2,7*Math.PI/4];
    let radius=65;
    for(let a of angles){

    cube.ccLabelEnd=now+1200;

}

// ===== GUMMY CUBE ABILITY =====
function updateGummyCubeAbility(cube,enemy,now){
  if(cube.gummyState!=="whole"||!cube.gummyCanSplit) return;
  if(now-cube.gummySplitTimer<10000) return;
  // --- SPLIT ---
  cube.hp=Math.min(cube.hp,8); cube.s=26; cube.gummyState="half";
  // Track mastery
  if(!bossMode){masteryProgress.Gummy=Math.min(masteryGoals.Gummy,(masteryProgress.Gummy||0)+1);checkMasteries();}
  // Spawn partner on opposite side of cube
  let _ang=Math.atan2(cube.vy,cube.vx)+Math.PI;
  let _px=Math.max(28,Math.min(332,cube.x+Math.cos(_ang)*40));
  let _py=Math.max(28,Math.min(332,cube.y+Math.sin(_ang)*40));
  gummyPartner={
    x:_px, y:_py, vx:-cube.vx, vy:-cube.vy,
    hp:8, s:26, c:cube.c,
    stunUntil:0, gummyShields:0, gummyIsHalf:true,
    angle:Math.random()*Math.PI*2,
    lastHit:0,
    hits:function(o){return Math.abs(this.x-o.x)<(this.s+o.s)/2&&Math.abs(this.y-o.y)<(this.s+o.s)/2;},
    draw:function(){
      let _gs=this.s,_glx=this.x-_gs/2,_gly=this.y-_gs/2,_gr=_gs*0.28;
      x.save();
      x.fillStyle=this.c; x.shadowColor=this.c; x.shadowBlur=8;
      x.beginPath();
      x.moveTo(_glx+_gr,_gly); x.lineTo(_glx+_gs-_gr,_gly);
      x.arcTo(_glx+_gs,_gly,_glx+_gs,_gly+_gr,_gr);
      x.lineTo(_glx+_gs,_gly+_gs-_gr);
      x.arcTo(_glx+_gs,_gly+_gs,_glx+_gs-_gr,_gly+_gs,_gr);
      x.lineTo(_glx+_gr,_gly+_gs);
      x.arcTo(_glx,_gly+_gs,_glx,_gly+_gs-_gr,_gr);
      x.lineTo(_glx,_gly+_gr);
      x.arcTo(_glx,_gly,_glx+_gr,_gly,_gr);
      x.closePath(); x.fill();
      x.globalAlpha=0.38; x.fillStyle="#fff";
      x.beginPath(); x.ellipse(_glx+_gs*0.28,_gly+_gs*0.22,_gs*0.16,_gs*0.1,-0.4,0,Math.PI*2); x.fill();
      x.globalAlpha=1;
      // Shield ring
      if(this.gummyShields>0){
        let _p=0.6+0.4*Math.sin(Date.now()/80);
        x.strokeStyle="rgba(100,220,100,"+_p+")"; x.lineWidth=3;
        x.shadowColor="#4caf50"; x.shadowBlur=14;
        x.beginPath(); x.arc(this.x,this.y,this.s/2+11,0,Math.PI*2); x.stroke();
      }
      // Stun ring
      if(this.stunUntil&&Date.now()<this.stunUntil){
        let _sz=0.65+0.35*Math.sin(Date.now()/40);
        x.strokeStyle="rgba(255,255,0,"+_sz+")"; x.lineWidth=3;
        x.shadowColor="#ffff00"; x.shadowBlur=14;
        x.beginPath(); x.arc(this.x,this.y,this.s/2+9,0,Math.PI*2); x.stroke();
      }
      x.fillStyle="#aaffaa"; x.font="bold 9px Arial"; x.textAlign="center";
      x.fillText("🍬 Half "+this.hp,this.x,this.y-this.s/2-6);
      x.textAlign="left";
      x.restore();
    },
    move:function(enemy){
      if(this.stunUntil&&Date.now()<this.stunUntil) return;
      // Gentle homing toward enemy
      if(enemy&&enemy.hp>0){
        let _dx=enemy.x-this.x,_dy=enemy.y-this.y,_dd=Math.sqrt(_dx*_dx+_dy*_dy)||1;
        this.vx+=(_dx/_dd)*0.12; this.vy+=(_dy/_dd)*0.12;
        let _spd=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
        if(_spd>3.5){this.vx=(this.vx/_spd)*3.5;this.vy=(this.vy/_spd)*3.5;}
      }
      this.x+=this.vx; this.y+=this.vy;
      let _h=this.s/2;
      if(this.x<=_h){this.x=_h;this.vx=Math.abs(this.vx);}
      if(this.x>=360-_h){this.x=360-_h;this.vx=-Math.abs(this.vx);}
      if(this.y<=_h){this.y=_h;this.vy=Math.abs(this.vy);}
      if(this.y>=360-_h){this.y=360-_h;this.vy=-Math.abs(this.vy);}
    }
  };
  SFX.hit(); // pop sound on split
}

// Process gummy partner: move, collide with enemy, apply banana peels, check death
function processGummyPartner(enemy,now){
  if(!gummyPartner||gummyPartner.hp<=0) return;
  // Apply banana peels to partner
  if(window.bananaPeels){
    for(let _bp of window.bananaPeels){
      if(_bp.life<=0) continue;
      let _dx=gummyPartner.x-_bp.x,_dy=gummyPartner.y-_bp.y;
      if(Math.sqrt(_dx*_dx+_dy*_dy)<gummyPartner.s+12){
        if(_bp.stun){gummyPartner.stunUntil=now+500;}
        let _a=Math.random()*Math.PI*2;
        gummyPartner.vx=Math.cos(_a)*gummyPartner.s*(_bp.stun?1.5:3);
        gummyPartner.vy=Math.sin(_a)*gummyPartner.s*(_bp.stun?1.5:3);
        _bp.life=0;
      }
    }
  }
  gummyPartner.move(enemy);
  // Collision with enemy
  if(enemy&&enemy.hp>0&&gummyPartner.hits(enemy)&&now-gummyPartner.lastHit>500){
    enemy.hp=Math.max(0,enemy.hp-1);
    gummyPartner.lastHit=now;
    SFX.hit();
    // Rebound
    let _a=Math.atan2(gummyPartner.y-enemy.y,gummyPartner.x-enemy.x);
    let _spd=Math.sqrt(gummyPartner.vx**2+gummyPartner.vy**2)||2.5;
    gummyPartner.vx=Math.cos(_a)*_spd; gummyPartner.vy=Math.sin(_a)*_spd;
  }
  // Partner takes 1 damage per second (tick-based)
  if(now-(gummyPartner.lastTickDmg||0)>=1000){
    gummyPartner.hp=Math.max(0,gummyPartner.hp-1);
    gummyPartner.lastTickDmg=now;
    if(gummyPartner.hp>0) SFX.hit();
  }
  gummyPartner.draw();
}

function _renderPartySlots(){
  for(let i=0;i<3;i++){

      let ch=CHARS.find(c=>c.type===_bossPartyPicked[i]);

function _renderPartyCubes(){
  let clist=document.getElementById("party-cube-list");
  clist.innerHTML="";
  let available=CHARS.filter(function(ch){return !ch.shopSection||shopOwned[ch.type];});
  available.forEach(function(ch){
    let sel=_bossPartyPicked.indexOf(ch.type)!==-1;
    let mastered=masteryUnlocked[ch.type];
    let card=document.createElement("div");
    card.className="pccard"+(sel?" psel":"");
    card.innerHTML="<div class='pcicon' style='background:"+ch.color+(mastered?";outline:2px solid #ffd700":"")+"'></div>"
      +"<div><div class='pcname'>"+(mastered?"⭐ ":"")+(ch.name||ch.type)+(sel?" ✓":"")+"</div>"

function confirmPartyFight(){
  if(_bossPartyPicked.length!==3)return;
  let _savedBossType=currentBossType;
  closePartyPanel();
  currentBossType=_savedBossType;
  // Build party with mastery info
  bossParty=_bossPartyPicked.map(function(t){return{type:t,mastered:!!masteryUnlocked[t]};});
  bossPartyIdx=0;
  activeBossType=_savedBossType; // lock in boss type for win tracking
  // Start boss fight
  if(run){run=false;p=null;o=null;clones=[];eggs=[];hatchlings=[];ehEggs=[];ehCarrots=[];_ghostEchoes=[];dragonParticles=[];gummyPartner=null;window.bananaPeels=[];}
  _lastLoopTs=0;
  bossMode=true;
  let bData=BOSSES.find(b=>b.type===currentBossType)||{color:"#f44336",label:"Boss"};
  p=new Cube(bossParty[0].type,80,180,bossParty[0].mastered);
  // Create boss as a Normal cube, then override stats
  o=new Cube("Normal",280,180,false);
  o.hp=35; o.s=58; o.c=bData.color;
  // Boost boss speed ~1.5x
  let _bs=Math.sqrt(o.vx*o.vx+o.vy*o.vy);
  o.vx=(o.vx/_bs)*3.8; o.vy=(o.vy/_bs)*3.8;
  o._isBoss=true;
  run=true;
  SFX.battleStart();
  document.getElementById("btn-start").innerText="⏹ Stop";
  requestAnimationFrame(loop);
}

function loadProgress(){
  try{
    let raw=localStorage.getItem("cubeBattle_progress");
    if(!raw) return;
    let d=JSON.parse(raw);
    if(d.masteryProgress) Object.assign(masteryProgress, d.masteryProgress);
    if(d.masteryUnlocked) Object.assign(masteryUnlocked, d.masteryUnlocked);
    if(typeof d.easterEggs==="number") easterEggs=d.easterEggs;
    if(typeof d.coins==="number") coins=d.coins;
    if(d.shopOwned) Object.assign(shopOwned, d.shopOwned);
    if(d.bossProgress){for(let _bk in d.bossProgress){if(bossProgress[_bk])Object.assign(bossProgress[_bk],d.bossProgress[_bk]);}}
    if((d.dataVersion||0)<2){ shopOwned.Phantom=false; }
    if((d.dataVersion||0)<3){ shopOwned.Dragon=false; }
    if((d.dataVersion||0)<5){ shopOwned.FocusedNinja=false; }
    if((d.dataVersion||0)<6){ shopOwned.Gummy=false; shopOwned.CubeCubePrank=false; }
    updateEggDisplay();
  } catch(e){ console.warn("Failed to load progress", e); }
  // Load dedicated boss progress key — always take higher wins
  try{
    let _braw=localStorage.getItem("cubeBattle_bossProgress");
    if(_braw){
      let _bd=JSON.parse(_braw);
      for(let _bk in _bd){
        if(bossProgress[_bk]){
          // Take the HIGHER win count between main save and dedicated save
          if((_bd[_bk].wins||0)>(bossProgress[_bk].wins||0)){
            bossProgress[_bk].wins=_bd[_bk].wins;
          }
          if(_bd[_bk].owned) bossProgress[_bk].owned=true;
        }
      }
      console.log("[BossWin] Loaded bossProgress:", JSON.stringify(bossProgress));
    }
  }catch(e){ console.warn("[BossWin] Failed to load dedicated boss progress", e); }
}

let _deleteStep=0, _deleteTimer=null;
function deleteProgress(){
  _deleteStep++;
  let btn=document.getElementById("btn-delete-progress");
  if(_deleteStep===1){
    btn.innerText="\u26a0\ufe0f Are you sure?";
    btn.style.background="#b8360b";
    clearTimeout(_deleteTimer);
    _deleteTimer=setTimeout(()=>{_deleteStep=0;if(btn){btn.innerText="\U0001f5d1 Delete Progress";btn.style.background="#6b2b2b";}},4000);
  } else if(_deleteStep===2){
    btn.innerText="\U0001f525 Are you REALLY sure?";
    btn.style.background="#8b0000";
    clearTimeout(_deleteTimer);
    _deleteTimer=setTimeout(()=>{_deleteStep=0;if(btn){btn.innerText="\U0001f5d1 Delete Progress";btn.style.background="#6b2b2b";}},4000);
  } else {
    clearTimeout(_deleteTimer); _deleteStep=0;
    localStorage.removeItem("cubeBattle_progress");
    Object.keys(masteryProgress).forEach(k=>masteryProgress[k]=0);
    Object.keys(masteryUnlocked).forEach(k=>masteryUnlocked[k]=false);
    Object.keys(shopOwned).forEach(k=>shopOwned[k]=false);
    Object.keys(bossProgress).forEach(k=>{bossProgress[k].wins=0;bossProgress[k].owned=false;});
    easterEggs=0; coins=0; updateEggDisplay();
    if(btn){btn.innerText="\u2705 Progress Deleted!"; btn.style.background="#2a7a2a";}
    setTimeout(()=>{if(btn){btn.innerText="\U0001f5d1 Delete Progress"; btn.style.background="#6b2b2b";}},2000);
  }
}


// ===== REPLAY SYSTEM =====
let replayFrames=[];
let replayRecording=false;
let replayFrameCount=0;
let replayBattleStart=0;
const REPLAY_SKIP=3;
const MAX_REPLAY_FRAMES=2400;
let _replayTab='recent';

function captureCubeState(cube){
  return {
    x:Math.round(cube.x),y:Math.round(cube.y),hp:cube.hp,s:cube.s,c:cube.c,
    t:cube.t,m:cube.mastered,angle:+(cube.angle.toFixed(2)),
    da:cube.dashActive||false,
    drain:cube.drainActive||false,
    stop:cube.stopActive||false,
    swap:cube.swapActive||false,
    swapB:cube.swapBoostActive||false,
    ms:cube.masteryShield||0,
    pm:cube.predMode||'scared',
    es:cube.evolveStage||1,
    rb:cube.rebirthFlash?((Date.now()-cube.rebirthFlash)<600):false,
    tr:(cube.trail||[]).slice(-6).map(t=>({x:Math.round(t.x),y:Math.round(t.y)}))
  };
}

function captureFrame(){
  if(!replayRecording||!p||!o)return;
  replayFrameCount++;
  if(replayFrameCount%REPLAY_SKIP!==0)return;
  if(replayFrames.length>=MAX_REPLAY_FRAMES)return;
  replayFrames.push({
    p:captureCubeState(p),
    o:captureCubeState(o),
    cl:clones.filter(cl=>cl.hp>0).map(cl=>({x:Math.round(cl.x),y:Math.round(cl.y),s:cl.s,c:cl.c,hp:cl.hp,angle:+(cl.angle.toFixed(2))})),
    eg:eggs.filter(eg=>eg.alive).map(eg=>({x:Math.round(eg.x),y:Math.round(eg.y),hp:eg.hp,prog:+((Date.now()-eg.spawnTime)/5000).toFixed(2)})),
    ht:hatchlings.filter(ht=>ht.hp>0).map(ht=>({x:Math.round(ht.x),y:Math.round(ht.y),s:ht.s,c:ht.c,hp:ht.hp,t:ht.t,angle:+(ht.angle.toFixed(2))})),
    ehEg:ehEggs.filter(e=>e.alive).map(e=>({x:Math.round(e.x),y:Math.round(e.y)})),
    ehCar:ehCarrots.filter(c=>c.alive).map(c=>({x:Math.round(c.x),y:Math.round(c.y)}))
  });
}

function saveReplayToStorage(result){
  if(replayFrames.length<15)return;
  let dur=Math.round((Date.now()-replayBattleStart)/1000);
  let replay={
    id:Date.now(),
    ts:Date.now(),
    player:selectedPlayer,
    pm:playerMastered,
    enemy:selectedEnemy,
    em:enemyMastered,
    result:result,
    dur:dur,
    frames:replayFrames.slice()
  };
  let replays=loadReplayList();
  replays.unshift(replay);
  if(replays.length>5)replays=replays.slice(0,5);
  try{localStorage.setItem('cubeBattle_replays',JSON.stringify(replays));}catch(e){console.warn('Replay save failed',e);}
}

function loadReplayList(){
  try{let r=localStorage.getItem('cubeBattle_replays');return r?JSON.parse(r):[];}catch(e){return[];}
}

function loadFavorites(){
  try{let r=localStorage.getItem('cubeBattle_favs');return r?JSON.parse(r):[];}catch(e){return[];}
}

function toggleFavorite(id){
  let favs=loadFavorites();
  let idx=favs.findIndex(f=>f.id===id);
  if(idx>=0){
    favs.splice(idx,1);
    try{localStorage.setItem('cubeBattle_favs',JSON.stringify(favs));}catch(e){}
  } else {
    let all=[...loadReplayList(),...favs];
    let r=all.find(r=>r.id===id);
    if(!r)return;
    if(!favs.find(f=>f.id===id)) favs.unshift(r);
    try{localStorage.setItem('cubeBattle_favs',JSON.stringify(favs));}catch(e){}

  renderReplayList();
}

function renderReplayList(){
  let list=document.getElementById('replay-list');
  list.innerHTML='';
  let favs=loadFavorites();
  let favIds=new Set(favs.map(f=>f.id));
  let items=_replayTab==='recent'?loadReplayList():favs;
  if(items.length===0){
    list.innerHTML='<div class="rcard-empty">'+(
      _replayTab==='recent'?'No replays yet.<br>Play some battles to record them!':'No favorites yet.<br>Star a replay to save it here!'
    )+'</div>';
    return;
  }
  items.forEach(r=>{
    let isFav=favIds.has(r.id);
    let resultEmoji=r.result==='player'?'🏆 Player Wins':r.result==='enemy'?'💀 Enemy Wins':'🤝 Tie';
    let pName=(r.pm?'⭐':'')+r.player;

    card.innerHTML=`
      <div class="rcard-top">

        <button class="${isFav?'rbtn-unfav':'rbtn-fav'}" onclick="toggleFavorite(${r.id})">${isFav?'★ Unfavorite':'☆ Favorite'}</button>
      </div>

    list.appendChild(card);

function watchReplay(id){
  let allReplays=[...loadReplayList(),...loadFavorites()];
  let seen=new Set(),deduped=[];
  for(let r of allReplays){if(!seen.has(r.id)){seen.add(r.id);deduped.push(r);}}
  let replay=deduped.find(r=>r.id===id);
  if(!replay){alert('Replay not found!');return;}
  let html=buildReplayHTML(replay);
  let blob=new Blob([html],{type:'text/html'});
  let url=URL.createObjectURL(blob);
  window.open(url,'_blank');
}

  let dateStr=new Date(replay.ts).toLocaleString();
  let frameJson=JSON.stringify(replay.frames);

  return `<!DOCTYPE html>
