<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cube Battle</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#222;color:#fff;text-align:center;font-family:Arial}
canvas{background:#333;margin:10px auto;display:block}

#topbar{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;padding:10px}
#topbar button{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold}
#btn-player{background:#c0392b;color:#fff}
#btn-enemy{background:#2980b9;color:#fff}
#btn-start{background:#27ae60;color:#fff}
#btn-restart{background:#555;color:#fff}
#btn-mastery{background:#b8860b;color:#fff}

#info{font-size:13px;color:#aaa;margin:2px 0 6px}

/* Modal */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;justify-content:center;align-items:center}
#modal.open{display:flex}
#modal-box{background:#2a2a2a;border:2px solid #555;border-radius:12px;padding:20px;width:320px;max-height:80vh;display:flex;flex-direction:column}
#modal-box h3{margin:0 0 14px;font-size:16px;color:#fff}
#char-list{overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px}
.char-card{display:flex;align-items:center;gap:14px;padding:12px;border-radius:10px;border:2px solid #444;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.char-card:hover{border-color:#fff;background:#3a3a3a}
.char-card.mastered-card{border-color:#ffd700}
.char-card.mastered-card:hover{background:#3a3000}
.char-icon{width:36px;height:36px;border-radius:4px;flex-shrink:0}
.char-info{text-align:left;flex:1}
.char-name{font-weight:bold;font-size:14px}
.char-desc{font-size:11px;color:#aaa;margin-top:2px}
.char-quest{font-size:11px;color:#888;margin-top:3px}
.char-mastery-desc{font-size:11px;color:#7ec8e3;margin-top:3px}
.mini-bar-wrap{background:#444;border-radius:3px;height:5px;margin-top:5px}
.mini-bar{background:#ffd700;border-radius:3px;height:5px}
#modal-cancel{margin-top:14px;padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#modal-cancel:hover{background:#666}

/* Mastery panel */
#mastery-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:center}
#mastery-panel.open{display:flex}
#mastery-box{background:#2a2a2a;border:2px solid #b8860b;border-radius:12px;padding:20px;width:340px;max-height:85vh;display:flex;flex-direction:column;gap:10px}
#mastery-box h3{margin:0;color:#ffd700;font-size:18px}
#mastery-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.m-row{background:#333;border-radius:8px;padding:10px 12px;border:2px solid #444}
.m-row.unlocked{border-color:#ffd700}
.m-title{font-weight:bold;font-size:13px;display:flex;align-items:center;gap:7px}
.m-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.m-quest{font-size:11px;color:#aaa;margin-top:3px}
.m-bar-wrap{background:#444;border-radius:4px;height:7px;margin-top:6px}
.m-bar{background:#ffd700;border-radius:4px;height:7px;transition:width 0.3s}
.m-ability{font-size:11px;color:#7ec8e3;margin-top:5px}
#mastery-close{margin-top:4px;padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#mastery-close:hover{background:#666}
/* Shop */
#shop-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:center}
#shop-panel.open{display:flex}
#shop-box{background:#2a2a2a;border:2px solid #ff9fc5;border-radius:12px;padding:20px;width:340px;max-height:85vh;display:flex;flex-direction:column;gap:10px}
#shop-box h3{margin:0;color:#ff9fc5;font-size:18px;display:flex;justify-content:space-between;align-items:center}
.shop-eggs-badge{color:#ffe082;font-size:14px}
.shop-tabs{display:flex;gap:8px}
.shop-tab{flex:1;padding:8px;background:#333;border:none;border-radius:6px;color:#aaa;cursor:pointer;font-size:13px}
.shop-tab.active{background:#444;color:#fff;border-bottom:2px solid #ff9fc5}
.shop-content{overflow-y:auto;display:flex;flex-direction:column;gap:10px;min-height:80px;padding:4px 0}
.shop-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;border:2px solid #555;background:#333}
.shop-card.buyable{border-color:#ffe082;cursor:pointer}
.shop-card.buyable:hover{background:#3a3000}
.shop-card.owned{border-color:#4caf50;cursor:default}
.shop-icon{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.shop-info{text-align:left;flex:1}
.shop-name{font-weight:bold;font-size:14px}
.shop-desc{font-size:11px;color:#aaa;margin-top:2px}
.shop-cost{font-size:12px;color:#ffe082;margin-top:3px;font-weight:bold}
#shop-close{padding:8px;background:#444;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#shop-close:hover{background:#666}

/* ===== REPLAY PANEL ===== */
#replay-panel{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;justify-content:center;align-items:center}
#replay-panel.open{display:flex}
#replay-box{background:#1e2a3a;border:2px solid #4a9eff;border-radius:12px;padding:20px;width:360px;max-height:85vh;display:flex;flex-direction:column;gap:10px}
#replay-box h3{margin:0;color:#4a9eff;font-size:18px}
#replay-tabs{display:flex;gap:8px}
.rtab{flex:1;padding:8px;background:#333;border:none;border-radius:6px;color:#aaa;cursor:pointer;font-size:13px;font-weight:bold}
.rtab.active{background:#1a3a5c;color:#fff;border-bottom:2px solid #4a9eff}
.rtab:hover{background:#2a4a6a;color:#fff}
#replay-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px;min-height:60px;max-height:55vh;padding-right:2px}
.rcard{background:#2a3a4a;border-radius:8px;padding:10px 12px;border:2px solid #3a5a7a;display:flex;flex-direction:column;gap:5px}
.rcard-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.rcard-title{font-weight:bold;font-size:13px;color:#e0f0ff}
.rcard-meta{font-size:11px;color:#7ab;margin-top:1px}
.rcard-btns{display:flex;gap:6px;margin-top:3px}
.rcard-btns button{flex:1;padding:5px 8px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold;transition:background 0.15s}
.rbtn-watch{background:#27ae60;color:#fff}
.rbtn-watch:hover{background:#2ecc71}
.rbtn-fav{background:#2a3a4a;border:1px solid #666;color:#ffd700}
.rbtn-fav:hover{background:#3a4a5a}
.rbtn-unfav{background:#7a6a00;border:1px solid #ffd700;color:#ffd700}
.rbtn-unfav:hover{background:#9a8a00}
.rcard-empty{text-align:center;color:#556;font-size:13px;padding:24px 12px}
#replay-close{padding:8px;background:#333;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:13px;width:100%}
#replay-close:hover{background:#555}
</style>
</head>
<body>

<h2 style="margin:12px 0 4px">⚔️ Cube Battle</h2>
<div id="info">No fighters selected</div>

<div id="topbar">
  <button id="btn-player" onclick="openPicker('player')">🟥 Select Player</button>
  <button id="btn-enemy"  onclick="openPicker('enemy')">🟦 Select Enemy</button>
  <button id="btn-start"  onclick="startOrRestart()">▶ Start Battle</button>
      <button id="btn-autoplay" onclick="toggleAutoplay()" style="background:#555;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;">🔁 Auto: OFF</button>
  <button id="btn-mastery" onclick="openMastery()">⭐ Masteries</button>
  <button id="btn-replay" onclick="openReplays()" style="background:#4a9eff;color:#fff;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold">🎬 Replays</button>
  <button id="btn-shop" style="background:#ff69b4;color:#fff;padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold" onclick="openShop()">🛒 Shop</button>
</div>
<div style="font-size:13px;margin:2px 0 4px"><span id="egg-display" style="color:#ffe082;font-size:14px;font-weight:bold"></span>
  <button id="btn-delete-progress" onclick="deleteProgress()" style="background:#6b2b2b;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-left:8px">🗑 Delete Progress</button></div>

<!-- Character Picker -->
<div id="modal">
  <div id="modal-box">
    <h3 id="modal-title">Choose a Fighter</h3>
    <div id="char-list"></div>
    <button id="modal-cancel" onclick="closePicker()">Cancel</button>
  </div>
</div>

<!-- Mastery Panel -->
<div id="mastery-panel">
  <div id="mastery-box">
    <h3>⭐ Masteries</h3>
    <div id="mastery-list"></div>
    <button id="mastery-close" onclick="closeMastery()">Close</button>
  </div>
</div>

<!-- Shop Panel -->
<div id="shop-panel">
  <div id="shop-box">
    <h3>&#x1F6D2; Shop <span id="shop-egg-count" class="shop-eggs-badge">&#x1F95A; 0</span></h3>
    <div class="shop-tabs">
      <button class="shop-tab active" id="tab-normal" onclick="switchShopTab('normal')">Normal</button>
      <button class="shop-tab" id="tab-limited" onclick="switchShopTab('limited')">&#x1F381; Limited</button>
    </div>
    <div class="shop-content" id="shop-content"></div>
    <button id="shop-close" onclick="closeShop()">Close</button>
  </div>
</div>


<!-- Replay Panel -->
<div id="replay-panel">
  <div id="replay-box">
    <h3>🎬 Replays</h3>
    <div id="replay-tabs">
      <button class="rtab active" id="rtab-recent" onclick="switchReplayTab('recent')">🕐 Recent</button>
      <button class="rtab" id="rtab-fav" onclick="switchReplayTab('favorites')">⭐ Favorites</button>
    </div>
    <div id="replay-list"></div>
    <button id="replay-close" onclick="closeReplays()">Close</button>
  </div>
</div>

<canvas id="c" width="360" height="360"></canvas>

<script>
let c=document.getElementById("c"),x=c.getContext("2d");
let p=null,o=null,run=false;
let selectedPlayer=null,selectedEnemy=null;
let playerMastered=false,enemyMastered=false;
let clones=[];
let eggs=[];
let hatchlings=[];
let easterEggs=0;
let autoPlay=false;
const shopOwned={EasterBunny:false};
let _shopTab="normal";

// ===== MASTERY STATE =====
const masteryProgress={Normal:0,Ninja:0,Stick:0,Shield:0,Vampire:0,Zigzag:0,Cloner:0,Swapper:0,Stopper:0,Predictor:0,Evolver:0,Rebirth:0,EasterBunny:0};
const masteryGoals={Normal:25,Ninja:20,Stick:10,Shield:10,Vampire:10,Zigzag:1,Cloner:2,Swapper:3,Stopper:5,Predictor:3,Evolver:1,Rebirth:5,EasterBunny:30};
const masteryUnlocked={Normal:false,Ninja:false,Stick:false,Shield:false,Vampire:false,Zigzag:false,Cloner:false,Swapper:false,Stopper:false,Predictor:false,Evolver:false,Rebirth:false,EasterBunny:false};

const CHARS=[
  {type:"Normal", color:"#c0392b",
   desc:"Balanced fighter. Deals 1 damage on collision.",
   quest:"Deal 25 damage total",
   masteryDesc:"Every 10s: gains a shield bubble that blocks 1 attack"},
  {type:"Ninja",  color:"#2980b9",
   desc:"Dashes every 3s at 3× speed for 0.3s.",
   quest:"Dash 20 times",
   masteryDesc:"Completely immune to damage while dashing"},
  {type:"Stick",  color:"#8B4513",
   desc:"Spinning stick tip hits for 2 damage & knocks enemy.",
   quest:"Hit enemy with stick 10 times",
   masteryDesc:"Stick tip now deals 3 damage instead of 2"},
  {type:"Shield", color:"#00bcd4",
   desc:"Rotating shield arc — attackers bounce off for 1 damage.",
   quest:"Block 10 attacks with shield",
   masteryDesc:"Shield now reflects 2 damage to attackers instead of 1"},
  {type:"Vampire",color:"#6a0dad",
   desc:"Every 15s fires a drain beam — steals 3 HP from the enemy.",
   quest:"Steal 10 HP total",
   masteryDesc:"Drain beam charges every 8s instead of 15s"},
  {type:"Zigzag", color:"#00ff99",
   desc:"Moves in sharp zigzag patterns. Leaves a glowing trail.",
   quest:"Win a match as Zigzag",
   masteryDesc:"Swaps between zigzag and smooth movement every 5s"},
  {type:"Cloner", color:"#e91e63",
   desc:"Spawns a mini clone each time it gets hit. Clones have 1 HP and attack the enemy.",
   quest:"Kill the enemy twice using clones",
   masteryDesc:"Clones copy the enemy's special ability (except Cloner)"},
  {type:"Swapper", color:"#ff6f00",
   desc:"Every 20s swaps HP with the enemy for 10s. Enemy dying on swapped HP counts as a win.",
   quest:"Kill 3 enemies with swapped health",
   masteryDesc:"Right after the swap ends, Swapper's HP is set to 10 for 5 seconds"},
  {type:"Stopper", color:"#9e9e9e",
   desc:"Every 10s: activates a 1-second stop field that blocks any incoming ability & resets the enemy's cooldown.",
   quest:"Stop 5 abilities",
   masteryDesc:"Every 15s: stores a block token that absorbs the very next incoming ability automatically"},
  {type:"Predictor", color:"#ce93d8",
   desc:"AI-driven: Scared mode flees; Predicting mode charges. Switches based on risk analysis.",
   quest:"Win 3 matches as Predictor",
   masteryDesc:"During Predicting mode: moves 1.5x faster and deals 2 damage on contact"},
  {type:"Evolver", color:"#43a047",
   desc:"Evolves through 5 stages when hit. Each stage needs 1 more hit: 2,3,4,5. Gains HP/Attack/Size.",
   quest:"Reach Stage 5 in a match",
   masteryDesc:"Each stage requires 1 fewer hit to evolve"},
  {type:"Rebirth", color:"#ff7043",
   desc:"At death, rebirths as a smaller cube with 5 HP instead of losing.",
   quest:"Revive 5 times",
   masteryDesc:"After rebirth, can revive a second time as an even tinier cube with 2 HP"},
  {type:"EasterBunny", color:"#ff9fc5",
   desc:"Every 10s spawns an egg at its spot. Eggs stand still (2 HP) and hatch a random cube after 5s.",
   quest:"Hatch 30 eggs successfully",
   masteryDesc:"Spawns 3 eggs at a time instead of 1",
   shopCost:40, shopSection:"limited"},
];

function checkMasteries(){
  for(let t in masteryGoals){
    if(!masteryUnlocked[t]&&masteryProgress[t]>=masteryGoals[t]) masteryUnlocked[t]=true;
  }
  saveProgress();
}

// ===== CUBE CLASS =====
class Cube{
constructor(type,X,Y,mastered){
  this.t=type;
  this.mastered=!!mastered;
  this.hp=10;
  this.s=40;
  this.x=X; this.y=Y;
  let spd=2.5;
  let base=(Math.floor(Math.random()*4))*(Math.PI/2)+(Math.PI/4);
  let ang=base+(Math.random()-0.5)*0.5;
  this.vx=Math.cos(ang)*spd;
  this.vy=Math.sin(ang)*spd;
  this.dashActive=false;
  this.c=type=="Normal"?"#c0392b":type=="Ninja"?"#2980b9":type=="Stick"?"#8B4513":type=="Shield"?"#00bcd4":type=="Vampire"?"#6a0dad":type=="Cloner"?"#e91e63":type=="Swapper"?"#ff6f00":type=="Stopper"?"#9e9e9e":type=="Predictor"?"#ce93d8":type=="Evolver"?"#43a047":type=="Rebirth"?"#ff7043":type=="EasterBunny"?"#ff9fc5":"#00ff99";
  this.lastHitByClone=false;
  // Swapper
  this.swapActive=false; this.lastSwap=Date.now()-15000; this.swapEnemy=null;
  this.swapBoostActive=false; this.killedDuringSwap=false;
  // Rebirth
  this.rebirthCount=0; this.rebirthFlash=0;
  // EasterBunny
  this.lastEggSpawn=Date.now()-8000;
  // Stopper
  this.stopActive=false; this.lastStop=Date.now()-8000; this.stopFlash=0;
  this.masteryBlockReady=false; this.lastMasteryBlock=Date.now()-13000;
  // Predictor
  this.predMode="scared"; this.predTimer=Date.now(); this.predCooldown=1500+Math.random()*1000;
  this.predModeTimer=Date.now();
  // Evolver
  this.evolveStage=1; this.evolveHitsNeeded=2; this.evolveHitCount=0; this.evolveFlash=0;
  // Zigzag
  this.zigTimer=0; this.zigInterval=18; this.trail=[];
  this.zigDir=1;
  this.zigMasteryMode="zigzag"; this.zigMasteryTimer=Date.now();
  // Timers
  this.lastDash=Date.now(); this.angle=0; this.lastHit=0;
  this.lastDrain=Date.now(); this.drainActive=false; this.drainTarget=null;
  // Normal mastery shield
  this.masteryShield=0; this.lastMasteryShield=Date.now();
}

draw(){
  // Mastery glow
  if(this.mastered){
    x.save();
    x.shadowColor="#ffd700"; x.shadowBlur=16;
    x.fillStyle=this.c;
    x.fillRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
    x.restore();
    // Gold border
    x.strokeStyle="#ffd700"; x.lineWidth=2;
    x.strokeRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
  } else {
    x.fillStyle=this.c;
    x.fillRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
  }

  // Normal mastery shield bubble
  if(this.t=="Normal"&&this.mastered&&this.masteryShield>0){
    x.save();
    x.strokeStyle="rgba(255,215,0,0.85)"; x.lineWidth=3;
    x.shadowColor="#ffd700"; x.shadowBlur=10;
    x.beginPath(); x.arc(this.x,this.y,this.s/2+9,0,Math.PI*2); x.stroke();
    x.restore();
  }

  // 🪵 STICK
  if(this.t=="Stick"){
    this.angle+=0.06;
    let len=70;
    let sx=this.x+Math.cos(this.angle)*len;
    let sy=this.y+Math.sin(this.angle)*len;
    x.strokeStyle=this.mastered?"#ffd700":"yellow"; x.lineWidth=5;
    x.beginPath(); x.moveTo(this.x,this.y); x.lineTo(sx,sy); x.stroke();
    this.stickTip={x:sx,y:sy};
  }

  // 🛡 SHIELD
  if(this.t=="Shield"){
    this.angle+=0.05;
    let r=55;
    x.strokeStyle=this.mastered?"#ffd700":"cyan"; x.lineWidth=10;
    x.beginPath(); x.arc(this.x,this.y,r,this.angle-0.7,this.angle+0.7); x.stroke();
    this.shieldZone={x:this.x+Math.cos(this.angle)*r,y:this.y+Math.sin(this.angle)*r};
  }

  // 🧛 VAMPIRE beam
  if(this.t=="Vampire"&&this.drainActive&&this.drainTarget){
    let t2=this.drainTarget;
    x.save();
    x.strokeStyle=this.mastered?"rgba(255,140,0,0.9)":"rgba(255,0,60,0.9)";
    x.lineWidth=4; x.shadowColor=this.mastered?"#ff8c00":"#ff003c"; x.shadowBlur=12;
    x.beginPath(); x.moveTo(this.x,this.y); x.lineTo(t2.x,t2.y); x.stroke();
    x.strokeStyle=this.mastered?"rgba(255,140,0,0.5)":"rgba(255,0,60,0.5)"; x.lineWidth=2;
    x.beginPath(); x.arc(t2.x,t2.y,t2.s/2+6,0,Math.PI*2); x.stroke();
    x.restore();
  }

  // ⚡ ZIGZAG trail
  if(this.t=="Zigzag"&&this.trail.length>1){
    x.save();
    x.strokeStyle=this.mastered?"rgba(255,215,0,0.5)":"rgba(0,255,153,0.5)";
    x.lineWidth=3; x.shadowColor=this.mastered?"#ffd700":"#00ff99"; x.shadowBlur=8;
    x.beginPath(); x.moveTo(this.trail[0].x,this.trail[0].y);
    for(let i=1;i<this.trail.length;i++) x.lineTo(this.trail[i].x,this.trail[i].y);
    x.stroke(); x.restore();
  }

  // 🔀 SWAPPER glow during swap
  if(this.t=="Swapper"&&this.swapActive){
    x.save();
    x.strokeStyle="rgba(255,111,0,0.9)"; x.lineWidth=3;
    x.shadowColor="#ff6f00"; x.shadowBlur=18;
    x.beginPath(); x.arc(this.x,this.y,this.s/2+8,0,Math.PI*2); x.stroke();
    x.restore();
  }
  // Swapper boost glow (mastered)
  if(this.t=="Swapper"&&this.swapBoostActive){
    x.save();
    x.strokeStyle="rgba(255,215,0,0.95)"; x.lineWidth=4;
    x.shadowColor="#ffd700"; x.shadowBlur=22;
    x.beginPath(); x.arc(this.x,this.y,this.s/2+14,0,Math.PI*2); x.stroke();
    x.restore();
  }
  // Swapper: glow the swapped-with enemy too
  if(this.swapEnemy&&this.swapEnemy.swapActive===false&&this===p||this===o){
    // (handled per-cube above)
  }

  // 🛑 STOPPER active stop field ring
  if(this.t=="Stopper"&&this.stopActive){
    x.save();
    let pulse=0.6+0.4*Math.sin(Date.now()/60);
    x.strokeStyle=`rgba(255,255,255,${pulse})`; x.lineWidth=4;
    x.shadowColor="#ffffff"; x.shadowBlur=20;
    x.beginPath(); x.arc(this.x,this.y,this.s/2+12,0,Math.PI*2); x.stroke();
    x.fillStyle=`rgba(255,255,255,${pulse})`; x.font="bold 10px Arial"; x.textAlign="center";
    x.fillText("STOP",this.x,this.y+4);
    x.textAlign="left";
    x.restore();
  }
  // Stopper mastery block token ready — gold outer ring
  if(this.t=="Stopper"&&this.mastered&&this.masteryBlockReady&&!this.stopActive){
    x.save();
    x.strokeStyle="rgba(255,215,0,0.85)"; x.lineWidth=3;
    x.shadowColor="#ffd700"; x.shadowBlur=14;
    x.setLineDash([5,5]);
    x.beginPath(); x.arc(this.x,this.y,this.s/2+12,0,Math.PI*2); x.stroke();
    x.restore();
  }

  // Predictor mode ring
  if(this.t==="Predictor"){
    x.save();
    let pulse=0.5+0.5*Math.sin(Date.now()/120);
    if(this.predMode==="scared"){
      x.strokeStyle="rgba(255,255,100,"+(0.4+pulse*0.5)+")"; x.lineWidth=3;
      x.shadowColor="#ffff66"; x.shadowBlur=10;
      x.beginPath(); x.arc(this.x,this.y,this.s/2+11,0,Math.PI*2); x.stroke();
      x.fillStyle="rgba(255,255,100,"+(0.5+pulse*0.5)+")"; x.font="bold 11px Arial"; x.textAlign="center";
      x.fillText("Scared!",this.x,this.y-this.s/2-16);
    } else {
      x.strokeStyle="rgba(200,80,255,"+(0.4+pulse*0.5)+")"; x.lineWidth=3;
      x.shadowColor="#cc44ff"; x.shadowBlur=14;
      x.beginPath(); x.arc(this.x,this.y,this.s/2+11,0,Math.PI*2); x.stroke();
      x.fillStyle="rgba(200,80,255,"+(0.5+pulse*0.5)+")"; x.font="bold 11px Arial"; x.textAlign="center";
      x.fillText("Predicting...",this.x,this.y-this.s/2-16);
    }
    x.textAlign="left"; x.restore();
  }

  // Evolver stage visuals
  if(this.t==="Evolver"){
    let stageColors=["","#43a047","#7cb342","#f9a825","#e64a19","#b71c1c"];
    this.c=stageColors[this.evolveStage];
    let flashAge=Date.now()-this.evolveFlash;
    if(flashAge<400){
      let alpha=1-(flashAge/400);
      x.save(); x.globalAlpha=alpha*0.7; x.fillStyle="#ffffff";
      x.fillRect(this.x-this.s/2-4,this.y-this.s/2-4,this.s+8,this.s+8); x.restore();
    }
    if(this.evolveStage===5){
      x.save(); x.shadowColor="#f44336"; x.shadowBlur=22;
      x.fillStyle=this.c; x.fillRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s); x.restore();
    }
    let stageLabels=["","S1","S2","S3","S4","*S5"];
    x.fillStyle=this.evolveStage===5?"#ffd700":"#fff";
    x.font="bold "+(this.evolveStage===5?"12":"10")+"px Arial"; x.textAlign="center";
    x.fillText(stageLabels[this.evolveStage],this.x,this.y-this.s/2-18);
    x.textAlign="left";
    let needed=this.mastered?Math.max(1,this.evolveHitsNeeded-1):this.evolveHitsNeeded;
    if(this.evolveStage<5){
      for(let d=0;d<needed;d++){
        let filled=d<this.evolveHitCount;
        x.beginPath(); x.arc(this.x-((needed-1)*5)+d*10,this.y+this.s/2+8,4,0,Math.PI*2);
        x.fillStyle=filled?"#fff":"rgba(255,255,255,0.3)"; x.fill();
      }
    }
  }

  // Rebirth visuals
  if(this.t==="Rebirth"){
    let maxR=this.mastered?2:1;
    let remaining=maxR-this.rebirthCount;
    if(remaining>0){
      x.font="12px Arial"; x.textAlign="center";
      let hearts=""; for(let i=0;i<remaining;i++) hearts+="♻";
      x.fillStyle="#ff7043"; x.fillText(hearts,this.x,this.y-this.s/2-18);
      x.textAlign="left";
    }
    if(this.rebirthFlash&&Date.now()-this.rebirthFlash<600){
      let prog=(Date.now()-this.rebirthFlash)/600;
      x.save();
      x.globalAlpha=(1-prog)*0.85;
      x.fillStyle="#ffffff";
      let r=this.s/2*(1+prog*2);
      x.beginPath(); x.arc(this.x,this.y,r,0,Math.PI*2); x.fill();
      x.restore();
    }
  }

  // Easter Bunny egg countdown
  if(this.t==="EasterBunny"){
    let _now=Date.now(),_cd=10000,_el=_now-this.lastEggSpawn,_tl=Math.max(0,(_cd-_el)/1000);
    x.save(); x.font="bold 10px Arial"; x.textAlign="center";
    x.fillStyle="#ffe082";
    x.fillText(_el>=_cd?"🥚 ready!":"🥚 "+_tl.toFixed(1)+"s",this.x,this.y-this.s/2-18);
    x.textAlign="left"; x.restore();
  }

  // HP label
  x.fillStyle="#fff"; x.font="12px Arial";
  x.fillText((this.mastered?"⭐":"")+this.t+" "+this.hp,this.x-22,this.y-this.s/2-5);

  // Dash flash
  if(this.dashActive){ x.strokeStyle="white"; x.lineWidth=3; x.strokeRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s); }
}

move(){
  // 🥷 Ninja dash
  if(this.t=="Ninja"&&!this.dashActive&&Date.now()-this.lastDash>3000){
    // 🛑 Stopper blocks Ninja dash if enemy's stop field is active (check the other cube)
    let ninjaEnemy=(this===p)?o:(this===o)?p:null;
    if(ninjaEnemy&&checkStopField(ninjaEnemy)){ this.lastDash=Date.now(); return; }
    this.dashActive=true; this.lastDash=Date.now();
    this.vx*=3; this.vy*=3;
    masteryProgress.Ninja=Math.min(masteryGoals.Ninja,(masteryProgress.Ninja||0)+1);
    checkMasteries();
    setTimeout(()=>{ this.vx/=3; this.vy/=3; this.dashActive=false; },300);
  }

  // Normal mastery: shield every 10s
  if(this.t=="Normal"&&this.mastered&&Date.now()-this.lastMasteryShield>10000&&this.masteryShield<3){
    this.masteryShield++;
    this.lastMasteryShield=Date.now();
  }

  // 🛑 Stopper: activate stop field every 10s for 1s
  if(this.t=="Stopper"&&!this.stopActive&&Date.now()-this.lastStop>=10000){
    this.stopActive=true; this.lastStop=Date.now();
    setTimeout(()=>{ this.stopActive=false; },1000);
  }
  // Stopper mastery: store a block token every 15s
  if(this.t=="Stopper"&&this.mastered&&!this.masteryBlockReady&&Date.now()-this.lastMasteryBlock>=15000){
    this.masteryBlockReady=true; this.lastMasteryBlock=Date.now();
  }

  // ⚡ Zigzag movement
  if(this.t=="Zigzag"){
    let doZig=true;
    if(this.mastered){
      if(Date.now()-this.zigMasteryTimer>5000){
        this.zigMasteryMode=this.zigMasteryMode==="zigzag"?"normal":"zigzag";
        this.zigMasteryTimer=Date.now();
      }
      doZig=this.zigMasteryMode==="zigzag";
    }
    if(doZig){
      this.zigTimer++;
      if(this.zigTimer>=this.zigInterval){
        this.zigTimer=0;
        let turnAngle=this.zigDir*(Math.PI*0.45);
        this.zigDir*=-1;
        let spd=3.0;
        let ca=Math.atan2(this.vy,this.vx);
        let na=ca+turnAngle;
        this.vx=Math.cos(na)*spd; this.vy=Math.sin(na)*spd;
      }
    }
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>12) this.trail.shift();
  }

  // Predictor AI
  if(this.t==="Predictor"){
    let other=(this===p)?o:(this===o)?p:null;
    if(other){
      let nowP=Date.now();
      let dx=other.x-this.x, dy=other.y-this.y;
      let dist=Math.sqrt(dx*dx+dy*dy)||1;
      let atkDur=this.mastered?3000:2000;
      if(this.predMode==="scared"&&nowP-this.predTimer>this.predCooldown){
        let enemyHasAbility=(other.drainActive||other.swapActive||other.stopActive||other.dashActive);
        let hpAdv=this.hp>other.hp;
        let enemyLow=other.hp<=3;
        let safe=enemyLow||(hpAdv&&!enemyHasAbility)||(!enemyHasAbility&&Math.random()<0.25);
        if(safe){ this.predMode="predicting"; this.predModeTimer=nowP; }
        this.predTimer=nowP; this.predCooldown=1500+Math.random()*1000;
      }
      if(this.predMode==="predicting"&&nowP-this.predModeTimer>atkDur){
        this.predMode="scared"; this.predTimer=nowP; this.predCooldown=1200+Math.random()*800;
      }
      let spd=(this.mastered&&this.predMode==="predicting")?4.5:3.0;
      let tvx,tvy;
      if(this.predMode==="scared"){
        let wallRange=90, wx=0, wy=0;
        if(this.x<wallRange) wx+=(wallRange-this.x)/wallRange*2.5;
        if(this.x>360-wallRange) wx-=(this.x-(360-wallRange))/wallRange*2.5;
        if(this.y<wallRange) wy+=(wallRange-this.y)/wallRange*2.5;
        if(this.y>360-wallRange) wy-=(this.y-(360-wallRange))/wallRange*2.5;
        let fx=-dx/dist+wx, fy=-dy/dist+wy;
        let flen=Math.sqrt(fx*fx+fy*fy)||1;
        tvx=(fx/flen)*spd; tvy=(fy/flen)*spd;
      } else {
        tvx=(dx/dist)*spd; tvy=(dy/dist)*spd;
        let hwA=this.s/2+5;
        if(this.x<=hwA&&tvx<0) tvx=Math.abs(tvx);
        if(this.x>=360-hwA&&tvx>0) tvx=-Math.abs(tvx);
        if(this.y<=hwA&&tvy<0) tvy=Math.abs(tvy);
        if(this.y>=360-hwA&&tvy>0) tvy=-Math.abs(tvy);
      }
      this.vx=tvx; this.vy=tvy;
    }
  }

  this.x+=this.vx; this.y+=this.vy;
  let half=this.s/2;
  if(this.x<=half){this.x=half;this.vx=Math.abs(this.vx);}
  if(this.x>=360-half){this.x=360-half;this.vx=-Math.abs(this.vx);}
  if(this.y<=half){this.y=half;this.vy=Math.abs(this.vy);}
  if(this.y>=360-half){this.y=360-half;this.vy=-Math.abs(this.vy);}
}
}

// ===== CLONE CLASS =====
class Clone {
  constructor(owner, enemy){
    this.owner=owner; this.enemy=enemy;
    this.mastered=owner.mastered;
    this.enemyType=enemy.t;
    this.x=owner.x+(Math.random()-0.5)*24;
    this.y=owner.y+(Math.random()-0.5)*24;
    this.s=20; this.hp=1; this.c=owner.c;
    let ang=Math.random()*Math.PI*2;
    this.vx=Math.cos(ang)*2.5; this.vy=Math.sin(ang)*2.5;
    this.lastHit=0; this.angle=Math.random()*Math.PI*2;
    this.stickTip=null; this.shieldZone=null;
    this.dashActive=false; this.lastDash=Date.now();
    this.zigTimer=0; this.zigInterval=18; this.zigDir=1; this.trail=[];
    this.lastDrain=Date.now(); this.drainActive=false;
  }
  abilType(){ return (!this.mastered||this.enemyType==="Cloner")?"Normal":this.enemyType; }
  move(){
    let at=this.abilType();
    if(at==="Ninja"&&!this.dashActive&&Date.now()-this.lastDash>3000){
      this.dashActive=true; this.lastDash=Date.now();
      this.vx*=3; this.vy*=3;
      setTimeout(()=>{ if(this.hp>0){this.vx/=3;this.vy/=3;} this.dashActive=false; },300);
    }
    if(at==="Zigzag"){
      this.zigTimer++;
      if(this.zigTimer>=this.zigInterval){
        this.zigTimer=0;
        let ta=this.zigDir*(Math.PI*0.45); this.zigDir*=-1;
        let spd=2.5,ca=Math.atan2(this.vy,this.vx),na=ca+ta;
        this.vx=Math.cos(na)*spd; this.vy=Math.sin(na)*spd;
      }
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>8) this.trail.shift();
    }
    this.x+=this.vx; this.y+=this.vy;
    let h=this.s/2;
    if(this.x<=h){this.x=h;this.vx=Math.abs(this.vx);}
    if(this.x>=360-h){this.x=360-h;this.vx=-Math.abs(this.vx);}
    if(this.y<=h){this.y=h;this.vy=Math.abs(this.vy);}
    if(this.y>=360-h){this.y=360-h;this.vy=-Math.abs(this.vy);}
  }
  draw(){
    let at=this.abilType();
    // Zigzag trail
    if(at==="Zigzag"&&this.trail.length>1){
      x.save(); x.strokeStyle="rgba(0,255,153,0.35)"; x.lineWidth=2;
      x.beginPath(); x.moveTo(this.trail[0].x,this.trail[0].y);
      for(let i=1;i<this.trail.length;i++) x.lineTo(this.trail[i].x,this.trail[i].y);
      x.stroke(); x.restore();
    }
    // Stick
    if(at==="Stick"){
      this.angle+=0.09;
      let len=28,sx=this.x+Math.cos(this.angle)*len,sy=this.y+Math.sin(this.angle)*len;
      x.strokeStyle="yellow"; x.lineWidth=2;
      x.beginPath(); x.moveTo(this.x,this.y); x.lineTo(sx,sy); x.stroke();
      this.stickTip={x:sx,y:sy};
    } else { this.stickTip=null; }
    // Shield
    if(at==="Shield"){
      this.angle+=0.07; let r=24;
      x.strokeStyle="cyan"; x.lineWidth=4;
      x.beginPath(); x.arc(this.x,this.y,r,this.angle-0.7,this.angle+0.7); x.stroke();
      this.shieldZone={x:this.x+Math.cos(this.angle)*r,y:this.y+Math.sin(this.angle)*r};
    } else { this.shieldZone=null; }
    // Clone body (semi-transparent, dashed border)
    x.save(); x.globalAlpha=0.78;
    x.fillStyle=this.c;
    x.fillRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
    x.strokeStyle="rgba(255,255,255,0.85)"; x.lineWidth=1.5;
    x.setLineDash([3,3]);
    x.strokeRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s);
    x.restore();
    if(this.dashActive){ x.strokeStyle="rgba(255,255,255,0.6)"; x.lineWidth=2; x.strokeRect(this.x-this.s/2,this.y-this.s/2,this.s,this.s); }
    x.fillStyle="rgba(255,255,255,0.65)"; x.font="8px Arial";
    x.fillText("clone",this.x-11,this.y-this.s/2-2);
  }
  hits(cube){ return Math.abs(this.x-cube.x)<(this.s+cube.s)/2&&Math.abs(this.y-cube.y)<(this.s+cube.s)/2; }
}

// ===== EGG + HATCHLING SYSTEM =====
const HATCH_TYPES=["Normal","Ninja","Stick","Shield","Vampire","Zigzag","Cloner","Stopper","Predictor","Evolver","Rebirth"];
const CHAR_COLORS_MAP={Normal:"#c0392b",Ninja:"#2980b9",Stick:"#8B4513",Shield:"#00bcd4",Vampire:"#6a0dad",Zigzag:"#00ff99",Cloner:"#e91e63",Swapper:"#ff6f00",Stopper:"#9e9e9e",Predictor:"#ce93d8",Evolver:"#43a047",Rebirth:"#ff7043"};

class Egg{
  constructor(ex,ey,owner){
    this.x=ex; this.y=ey; this.owner=owner;
    this.hp=2; this.spawnTime=Date.now(); this.s=18; this.alive=true; this.lastHit=0;
  }
  draw(){
    if(!this.alive)return;
    let tl=Math.max(0,5000-(Date.now()-this.spawnTime));
    let pulse=tl<1200?(0.5+0.5*Math.sin(Date.now()/70)):1;
    x.save();
    x.globalAlpha=pulse;
    x.fillStyle="#ffe082";
    x.beginPath(); x.ellipse(this.x,this.y,this.s/2,this.s/2*1.25,0,0,Math.PI*2); x.fill();
    if(this.hp<=1){
      x.strokeStyle="#795548"; x.lineWidth=1;
      x.beginPath(); x.moveTo(this.x-2,this.y-4); x.lineTo(this.x+2,this.y); x.lineTo(this.x-1,this.y+4); x.stroke();
    }
    x.globalAlpha=1;
    let prog=tl/5000;
    x.fillStyle="#222"; x.fillRect(this.x-9,this.y+this.s/2*1.25+3,18,3);
    x.fillStyle="#4caf50"; x.fillRect(this.x-9,this.y+this.s/2*1.25+3,18*prog,3);
    x.restore();
  }
  shouldHatch(){return this.alive&&this.hp>0&&(Date.now()-this.spawnTime)>=5000;}
  hits(cube){return Math.abs(this.x-cube.x)<(this.s/2+cube.s/2)&&Math.abs(this.y-cube.y)<(this.s/2*1.25+cube.s/2);}
}

  draw(){

function easterBunnySpawn(bunny,enemy){
  let now=Date.now();
  if(now-bunny.lastEggSpawn<10000)return;
  bunny.lastEggSpawn=now;
  let cnt=bunny.mastered?3:1;
  for(let i=0;i<cnt;i++){
    let ex=bunny.x+(Math.random()-0.5)*24,ey=bunny.y+(Math.random()-0.5)*24;
    ex=Math.max(16,Math.min(344,ex)); ey=Math.max(16,Math.min(344,ey));
    eggs.push(new Egg(ex,ey,bunny));
  }
}

function processEggs(){
  let surviving=[],now=Date.now();
  for(let egg of eggs){
    if(!egg.alive||egg.hp<=0)continue;
    let eggEnemy=(egg.owner===p)?o:p;
    if(eggEnemy&&eggEnemy.hp>0&&egg.hits(eggEnemy)&&now-egg.lastHit>500){
      egg.hp--; egg.lastHit=now;
      if(egg.hp<=0){egg.alive=false;continue;}
    }
    if(egg.shouldHatch()){
      egg.alive=false;
      let type=HATCH_TYPES[Math.floor(Math.random()*HATCH_TYPES.length)];
      hatchlings.push(new Hatchling(type,egg.owner,eggEnemy));
      let side=egg.owner===p?selectedPlayer:selectedEnemy;
      if(side==="EasterBunny"){
        masteryProgress.EasterBunny=Math.min(masteryGoals.EasterBunny,(masteryProgress.EasterBunny||0)+1);
        checkMasteries();
      }
      x.save(); x.globalAlpha=0.5; x.fillStyle="#ffe082";
      x.beginPath(); x.arc(egg.x,egg.y,28,0,Math.PI*2); x.fill(); x.restore();
      continue;
    }
    egg.draw();
    surviving.push(egg);
  }
  eggs=surviving;
}

function processHatchlings(){
  let surviving=[],now=Date.now();
  for(let h of hatchlings){
    if(h.hp<=0)continue;
    h.move();
    let tgt=h.enemy;
    if(h.stickTip&&tgt&&tgt.hp>0&&now-h.lastHit>400){
      if(Math.abs(h.stickTip.x-tgt.x)<tgt.s/2+5&&Math.abs(h.stickTip.y-tgt.y)<tgt.s/2+5){
        applyDamage(tgt,null,1); h.hp--; h.lastHit=now;
      }
    }
    // Physical collision with enemy — bounce them
    if(tgt&&tgt.hp>0&&h.hits(tgt)){
      let dxH=tgt.x-h.x,dyH=tgt.y-h.y;
      let dist=Math.sqrt(dxH*dxH+dyH*dyH)||1;
      let nx=dxH/dist,ny=dyH/dist;
      let overlap=(h.s/2+tgt.s/2)-dist;
      if(overlap>0){
        tgt.x+=nx*overlap*0.6; tgt.y+=ny*overlap*0.6;
        h.x-=nx*overlap*0.4; h.y-=ny*overlap*0.4;
      }
      let relV=(h.vx-tgt.vx)*nx+(h.vy-tgt.vy)*ny;
      if(relV>0){ tgt.vx+=relV*nx*0.8; tgt.vy+=relV*ny*0.8; h.vx-=relV*nx*0.5; h.vy-=relV*ny*0.5; }
      if(now-h.lastHit>400){
        if((h.vx*dxH+h.vy*dyH)>0){applyDamage(tgt,null,1);h.hp--;h.lastHit=now;}
        else if((tgt.vx*(h.x-tgt.x)+tgt.vy*(h.y-tgt.y))>0&&h.hp>0){h.hp--;h.lastHit=now;}
      }
    }
    if(h.hp>0){h.draw();surviving.push(h);}
  }
  hatchlings=surviving;
}

function spawnClone(owner,enemy){
  if(clones.filter(c=>c.owner===owner).length>=6) return;
  clones.push(new Clone(owner,enemy));
}

function processClones(){
  clones=clones.filter(cl=>cl.hp>0);
  for(let cl of [...clones]){
    if(cl.hp<=0) continue;
    cl.move();
    let tgt=cl.enemy;
    let now=Date.now();
    // Clone stick tip damages enemy
    if(cl.stickTip&&tgt.hp>0&&now-cl.lastHit>400){
      if(Math.abs(cl.stickTip.x-tgt.x)<tgt.s/2+5&&Math.abs(cl.stickTip.y-tgt.y)<tgt.s/2+5){
        let hit=applyDamage(tgt,null,1);
        if(hit){ tgt.lastHitByClone=true; cl.lastHit=now; }
      }
    }
    // Clone body hits enemy
    if(cl.hits(tgt)&&tgt.hp>0&&now-cl.lastHit>400){
      let dx=tgt.x-cl.x,dy=tgt.y-cl.y;
      let towards=(cl.vx*dx+cl.vy*dy)>0;
      if(towards){
        let hit=applyDamage(tgt,null,1);
        if(hit){ tgt.lastHitByClone=true; cl.lastHit=now; cl.hp=0; }
      }
    }
    // Vampire clone: drain 1 HP to owner every 10s
    if(cl.abilType()==="Vampire"&&!cl.drainActive&&now-cl.lastDrain>10000&&tgt.hp>0){
      cl.drainActive=true; cl.lastDrain=now;
      setTimeout(()=>{
        if(!run||cl.hp<=0) return;
        let steal=Math.min(1,tgt.hp); tgt.hp-=steal; cl.owner.hp+=steal;
        if(steal>0) tgt.lastHitByClone=true;
        cl.drainActive=false;
      },600);
    }
    cl.draw();
  }
}

// ===== HELPERS =====
function collide(a,b){
  return Math.abs(a.x-b.x)<(a.s+b.s)/2&&Math.abs(a.y-b.y)<(a.s+b.s)/2;
}
function bounceOff(a,b){
  let ox=(a.s+b.s)/2-Math.abs(a.x-b.x);
  let oy=(a.s+b.s)/2-Math.abs(a.y-b.y);
  if(ox<oy){let d=a.x<b.x?-1:1;a.x+=d*(ox/2+1);b.x-=d*(ox/2+1);let t=a.vx;a.vx=b.vx;b.vx=t;}
  else{let d=a.y<b.y?-1:1;a.y+=d*(oy/2+1);b.y-=d*(oy/2+1);let t=a.vy;a.vy=b.vy;b.vy=t;}
  function nudge(cube){let spd=Math.sqrt(cube.vx**2+cube.vy**2),ang=Math.atan2(cube.vy,cube.vx)+(Math.random()-0.5)*0.3;cube.vx=Math.cos(ang)*spd;cube.vy=Math.sin(ang)*spd;}
  nudge(a);nudge(b);
}
function movingTowards(a,b){let dx=b.x-a.x,dy=b.y-a.y;return(a.vx*dx+a.vy*dy)>0;}
function hitsShieldArc(shield,px,py){
  let dx=px-shield.x,dy=py-shield.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(Math.abs(dist-55)>18)return false;
  let ang=Math.atan2(dy,dx),diff=ang-shield.angle;
  while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;
  return Math.abs(diff)<0.7;
}

// 🛑 Stopper: returns true if an ability targeting `stopper` is blocked
function checkStopField(stopper){
  if(!stopper||stopper.t!=="Stopper") return false;
  if(stopper.stopActive){
    masteryProgress.Stopper=Math.min(masteryGoals.Stopper,(masteryProgress.Stopper||0)+1);
    checkMasteries();
    return true;
  }
  if(stopper.mastered&&stopper.masteryBlockReady){
    stopper.masteryBlockReady=false;
    stopper.lastMasteryBlock=Date.now(); // restart the 15s timer
    masteryProgress.Stopper=Math.min(masteryGoals.Stopper,(masteryProgress.Stopper||0)+1);
    checkMasteries();
    return true;
  }
  return false;
}

// Evolver: register hit and evolve
function evolverHit(ev){
  if(ev.evolveStage>=5) return;
  ev.evolveHitCount++;
  let needed=ev.mastered?Math.max(1,ev.evolveHitsNeeded-1):ev.evolveHitsNeeded;
  if(ev.evolveHitCount>=needed){
    ev.evolveStage++;
    ev.evolveHitCount=0;
    ev.evolveHitsNeeded++;
    let stageHP=[0,10,11,10,20,30];
    ev.hp=stageHP[ev.evolveStage];
    if(ev.evolveStage===4) ev.s=50;
    if(ev.evolveStage===5){ ev.s=55; masteryProgress.Evolver=1; checkMasteries(); }
    ev.evolveFlash=Date.now();
    let hw=ev.s/2+2;
    ev.x=Math.max(hw,Math.min(360-hw,ev.x));
    ev.y=Math.max(hw,Math.min(360-hw,ev.y));
  }
}

// Apply damage to a cube (respects mastery shield + ninja immunity)
function applyDamage(victim,attacker,amount){
  // Ninja mastery: immune while dashing
  if(victim.t=="Ninja"&&victim.mastered&&victim.dashActive) return false;
  // Normal mastery shield bubble
  if(victim.t=="Normal"&&victim.mastered&&victim.masteryShield>0){
    victim.masteryShield--;
    return false; // absorbed
  }
  victim.hp-=amount;
  // Reset clone-kill flag when real cube deals damage
  if(attacker) victim.lastHitByClone=false;
  // Evolver: register hit
  if(victim.t==="Evolver") evolverHit(victim);
  // Cloner: spawn a clone when hit
  if(victim.t==="Cloner"&&run){
    let cloneEnemy=(victim===p)?o:(victim===o)?p:null;
    if(cloneEnemy) spawnClone(victim,cloneEnemy);
  }
  // Track Normal mastery progress (damage dealt by attacker)
  if(attacker&&attacker.t=="Normal"){
    masteryProgress.Normal=Math.min(masteryGoals.Normal,(masteryProgress.Normal||0)+amount);
    checkMasteries();
  }
  return true;
}

// 🪵 Stick
function stickDamage(stick,enemy){
  if(stick.t!="Stick"||!stick.stickTip)return;
  let tip=stick.stickTip,half=enemy.s/2;
  if(Math.abs(tip.x-enemy.x)<half+6&&Math.abs(tip.y-enemy.y)<half+6){
    let dx=enemy.x-tip.x,dy=enemy.y-tip.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    let spd=Math.sqrt(enemy.vx**2+enemy.vy**2)||2.5;
    enemy.vx=(dx/dist)*spd; enemy.vy=(dy/dist)*spd;
    enemy.x=tip.x+(dx/dist)*(half+8); enemy.y=tip.y+(dy/dist)*(half+8);
    let now=Date.now();
    if(now-enemy.lastHit>400){
      // 🛑 Stopper blocks stick hit
      if(checkStopField(enemy)){ enemy.lastHit=now; stick.lastDash=Date.now(); return; }
      let dmg=stick.mastered?3:2;
      let hit=applyDamage(enemy,stick,dmg);
      if(hit){
        masteryProgress.Stick=Math.min(masteryGoals.Stick,(masteryProgress.Stick||0)+1);
        checkMasteries();
      }
      enemy.lastHit=now;
    }
  }
}

// 🧛 Vampire
function vampireDrain(vampire,enemy){
  if(vampire.t!="Vampire")return;
  let now=Date.now();
  let cd=vampire.mastered?8000:15000;
  if(!vampire.drainActive&&now-vampire.lastDrain>cd){
    // 🛑 Stopper blocks vampire drain
    if(checkStopField(enemy)){ vampire.lastDrain=Date.now(); return; }
    vampire.drainActive=true; vampire.drainTarget=enemy; vampire.lastDrain=now;
    setTimeout(()=>{
      if(!run)return;
      let steal=Math.min(3,enemy.hp);
      enemy.hp-=steal; vampire.hp+=steal;
      vampire.drainActive=false; vampire.drainTarget=null;
      masteryProgress.Vampire=Math.min(masteryGoals.Vampire,(masteryProgress.Vampire||0)+steal);
      checkMasteries();
    },1000);
  }
}

// 🔀 Swapper
function swapperAbility(swapper, enemy){
  if(swapper.t!="Swapper"||swapper.swapActive) return;
  let now=Date.now();
  if(now-swapper.lastSwap<20000) return;
  // 🛑 Stopper blocks swap
  if(checkStopField(enemy)){ swapper.lastSwap=Date.now(); return; }
  // Initiate swap
  swapper.swapActive=true;
  swapper.lastSwap=now;
  swapper.swapEnemy=enemy;
  enemy.killedDuringSwap=false;
  // Swap HP
  let tmp=swapper.hp; swapper.hp=enemy.hp; enemy.hp=tmp;
  // Show swap indicator on enemy too
  let savedEnemySwapActive=enemy.swapActive;
  enemy.swapActive=true; // so it gets the orange ring too
  setTimeout(()=>{
    if(!run) return;
    // Swap back (simple swap of current values)
    let t2=swapper.hp; swapper.hp=enemy.hp; enemy.hp=t2;
    swapper.swapActive=false;
    enemy.swapActive=savedEnemySwapActive;
    swapper.swapEnemy=null;
    // Mastered: set swapper HP to 10 for 5s
    if(swapper.mastered){
      swapper.swapBoostActive=true;
      let hpBefore=swapper.hp;
      swapper.hp=Math.max(swapper.hp,10);
      let boostedTo=swapper.hp;
      setTimeout(()=>{
        if(!run) return;
        // Revert: remove the boost amount
        let diff=boostedTo-hpBefore;
        swapper.hp=Math.max(0,swapper.hp-diff);
        swapper.swapBoostActive=false;
      },5000);
    }
  },10000);
}

// ⚔️ Body combat
function handleCombat(a,b){
  if(!collide(a,b))return;
  let now=Date.now();
  let aTo=movingTowards(a,b),bTo=movingTowards(b,a);

  // Shield check
  if(b.t=="Shield"&&aTo&&hitsShieldArc(b,a.x,a.y)){
    if(now-a.lastHit>400){
      // 🛑 Stopper blocks shield reflect
      if(checkStopField(a)){ a.lastHit=now; return; }

      let dmg=b.mastered?2:1;
      applyDamage(a,null,dmg);
      a.lastHit=now;
      masteryProgress.Shield=Math.min(masteryGoals.Shield,(masteryProgress.Shield||0)+1);
      checkMasteries();
    }
    return;
  }
  if(a.t=="Shield"&&bTo&&hitsShieldArc(a,b.x,b.y)){
    if(now-b.lastHit>400){
      // 🛑 Stopper blocks shield reflect
      if(checkStopField(b)){ b.lastHit=now; return; }
      let dmg=a.mastered?2:1;
      applyDamage(b,null,dmg);
      b.lastHit=now;
      masteryProgress.Shield=Math.min(masteryGoals.Shield,(masteryProgress.Shield||0)+1);
      checkMasteries();
    }
    return;
  }

  let aNearBStick=b.t=="Stick"&&b.stickTip&&Math.abs(b.stickTip.x-a.x)<a.s/2+10&&Math.abs(b.stickTip.y-a.y)<a.s/2+10;
  let bNearAStick=a.t=="Stick"&&a.stickTip&&Math.abs(a.stickTip.x-b.x)<b.s/2+10&&Math.abs(a.stickTip.y-b.y)<b.s/2+10;

  if(aTo&&!aNearBStick&&now-b.lastHit>400){
    let dmg=1;
    if(a.t==="Predictor"&&a.mastered&&a.predMode==="predicting") dmg=2;
    if(a.t==="Evolver") dmg=a.evolveStage>=5?3:a.evolveStage>=3?2:1;
    applyDamage(b,a,dmg); b.lastHit=now;
    if(a.t==="Predictor"&&a.predMode==="predicting"){a.predMode="scared";a.predTimer=now;a.predCooldown=1500+Math.random()*1000;}
  }
  if(bTo&&!bNearAStick&&now-a.lastHit>400){
    let dmg=1;
    if(b.t==="Predictor"&&b.mastered&&b.predMode==="predicting") dmg=2;
    if(b.t==="Evolver") dmg=b.evolveStage>=5?3:b.evolveStage>=3?2:1;
    applyDamage(a,b,dmg); a.lastHit=now;
    if(b.t==="Predictor"&&b.predMode==="predicting"){b.predMode="scared";b.predTimer=now;b.predCooldown=1500+Math.random()*1000;}
  }
}

// 🔄 Rebirth: intercept death and revive as smaller cube
function checkRebirth(cube){
  if(cube.t!=="Rebirth") return false;
  let maxR=cube.mastered?2:1;
  if(cube.rebirthCount>=maxR) return false;
  cube.rebirthCount++;
  cube.hp=cube.rebirthCount===1?5:2;
  cube.s=cube.rebirthCount===1?26:16;
  cube.rebirthFlash=Date.now();
  // Clamp inside arena
  let hw=cube.s/2+2;
  cube.x=Math.max(hw,Math.min(360-hw,cube.x));
  cube.y=Math.max(hw,Math.min(360-hw,cube.y));
  // Track mastery progress
  let side=(cube===p)?selectedPlayer:selectedEnemy;
  if(side==="Rebirth"){
    masteryProgress.Rebirth=Math.min(masteryGoals.Rebirth,(masteryProgress.Rebirth||0)+1);
    checkMasteries();
  }
  return true;
}

// ===== GAME LOOP =====
function loop(){
  if(!run)return;
  captureFrame();
  x.clearRect(0,0,360,360);
  p.move(); o.move();
  if(collide(p,o)){handleCombat(p,o);bounceOff(p,o);}
  stickDamage(p,o); stickDamage(o,p);
  vampireDrain(p,o); vampireDrain(o,p);
  swapperAbility(p,o); swapperAbility(o,p);
  if(p&&p.t==="EasterBunny")easterBunnySpawn(p,o);
  if(o&&o.t==="EasterBunny")easterBunnySpawn(o,p);
  processClones();
  processEggs();
  processHatchlings();
  p.draw(); o.draw();
  // Rebirth interception — must run before death check
  if(p.hp<=0) checkRebirth(p);
  if(o.hp<=0) checkRebirth(o);

  if(p.hp<=0||o.hp<=0){
    let _replayResult=p.hp<=0&&o.hp<=0?'tie':p.hp>0?'player':'enemy';
    replayRecording=false;
    saveReplayToStorage(_replayResult);
    run=false;
    clones=[]; eggs=[]; hatchlings=[];
    let pWins=p.hp>0&&o.hp<=0, oWins=o.hp>0&&p.hp<=0;
    if(pWins&&selectedPlayer=="Zigzag"){masteryProgress.Zigzag=1;checkMasteries();}
    if(oWins&&selectedEnemy=="Zigzag"){masteryProgress.Zigzag=1;checkMasteries();}
    if(pWins&&o.lastHitByClone&&selectedPlayer=="Cloner"){masteryProgress.Cloner=Math.min(masteryGoals.Cloner,(masteryProgress.Cloner||0)+1);checkMasteries();}
    if(oWins&&p.lastHitByClone&&selectedEnemy=="Cloner"){masteryProgress.Cloner=Math.min(masteryGoals.Cloner,(masteryProgress.Cloner||0)+1);checkMasteries();}
    // Swapper: enemy died while swap was active
    if(pWins&&p.swapActive&&selectedPlayer=="Swapper"){masteryProgress.Swapper=Math.min(masteryGoals.Swapper,(masteryProgress.Swapper||0)+1);checkMasteries();}
    if(oWins&&o.swapActive&&selectedEnemy=="Swapper"){masteryProgress.Swapper=Math.min(masteryGoals.Swapper,(masteryProgress.Swapper||0)+1);checkMasteries();}
    if(pWins&&selectedPlayer=="Predictor"){masteryProgress.Predictor=Math.min(masteryGoals.Predictor,(masteryProgress.Predictor||0)+1);checkMasteries();}
    if(oWins&&selectedEnemy=="Predictor"){masteryProgress.Predictor=Math.min(masteryGoals.Predictor,(masteryProgress.Predictor||0)+1);checkMasteries();}
    x.fillStyle="rgba(0,0,0,0.6)"; x.fillRect(0,140,360,80);
    x.fillStyle="#fff"; x.font="bold 28px Arial"; x.textAlign="center";
    x.fillText(p.hp<=0&&o.hp<=0?"It's a Tie!":p.hp>0?"Player Wins! 🏆":"Enemy Wins! 🏆",180,190);
    easterEggs++;
    updateEggDisplay();
    saveProgress();
    document.getElementById("btn-start").innerText="▶ Start Battle";
    if(autoPlay) setTimeout(()=>{ if(!run) startOrRestart(); }, 1500);
    x.textAlign="left";
    return;
  }
  requestAnimationFrame(loop);
}

let pickerTarget=null;

      <div class="char-icon" style="background:${ch.color}"></div>

function closeMastery(){ document.getElementById("mastery-panel").classList.remove("open"); }

function startOrRestart(){
  if(run){
    run=false;
    if(p){p.swapActive=false;p.swapBoostActive=false;p.swapEnemy=null;p.stopActive=false;p.masteryBlockReady=false;p.predMode="scared";p.predTimer=Date.now();}
    if(o){o.swapActive=false;o.swapBoostActive=false;o.swapEnemy=null;o.stopActive=false;o.masteryBlockReady=false;o.predMode="scared";o.predTimer=Date.now();}
    if(p){p.rebirthCount=0;p.rebirthFlash=0;}
    if(o){o.rebirthCount=0;o.rebirthFlash=0;}
    p=null; o=null; clones=[]; eggs=[]; hatchlings=[];
    x.clearRect(0,0,360,360);
    updateInfo();
    document.getElementById("btn-start").innerText="▶ Start Battle";
  } else {
    if(!selectedPlayer||!selectedEnemy){alert("Select both cubes first!");return;}
    replayFrames=[];
    replayRecording=true;
    replayFrameCount=0;
    replayBattleStart=Date.now();
    p=new Cube(selectedPlayer,80,180,playerMastered);
    o=new Cube(selectedEnemy,280,180,enemyMastered);
    run=true;
    document.getElementById("btn-start").innerText="⏹ Stop";
    loop();
  }
}

  let ch=CHARS.find(function(cc){return cc.type==="EasterBunny";});
  if(!ch)return;
  let owned=shopOwned.EasterBunny;
  let canBuy=!owned&&easterEggs>=ch.shopCost;
  let card=document.createElement("div");
  card.className="shop-card "+(owned?"owned":canBuy?"buyable":"");
  let costTxt=owned?"\u2705 Owned!":"\u{1F95A} "+ch.shopCost+" Easter Eggs"+(!canBuy&&!owned?" (need more)":"");
  let nameCol=owned?"#4caf50":"#ff9fc5";
  card.innerHTML="<div class='shop-icon' style='background:#ff9fc5'>\u{1F430}</div>"
    +"<div class='shop-info'>"
    +"<div class='shop-name' style='color:"+nameCol+"'>"+(owned?"\u2705 ":"")+"Easter Bunny</div>"
    +"<div class='shop-desc'>"+ch.desc+"</div>"
    +"<div class='shop-cost'>"+costTxt+"</div>"
    +"</div>";
  if(!owned){
    card.onclick=function(){
      if(easterEggs>=ch.shopCost){
        easterEggs-=ch.shopCost;
        shopOwned.EasterBunny=true;
        saveProgress();
        updateEggDisplay();
        updateShopContent();
        alert("\u{1F430} Easter Bunny unlocked! Find it in the character picker.");
      } else {
        alert("Need "+ch.shopCost+" easter eggs! You have "+easterEggs+".");
      }
    };
  }
  cont.appendChild(card);
}

// ===== PROGRESS PERSISTENCE =====
function saveProgress(){
  try{
    localStorage.setItem("cubeBattle_progress", JSON.stringify({
      masteryProgress: masteryProgress,
      masteryUnlocked: masteryUnlocked,
      easterEggs: easterEggs,
      shopOwned: shopOwned
    }));
  }catch(e){}
}

function loadProgress(){
  try{
    let raw=localStorage.getItem("cubeBattle_progress");
    if(!raw) return;
    let d=JSON.parse(raw);
    if(d.masteryProgress) Object.assign(masteryProgress, d.masteryProgress);
    if(d.masteryUnlocked) Object.assign(masteryUnlocked, d.masteryUnlocked);
    if(typeof d.easterEggs==="number") easterEggs=d.easterEggs;
    if(d.shopOwned) Object.assign(shopOwned, d.shopOwned);
    updateEggDisplay();
  } catch(e){ console.warn("Failed to load progress", e); }
}

let _deleteStep=0, _deleteTimer=null;
function deleteProgress(){
  _deleteStep++;
  let btn=document.getElementById("btn-delete-progress");
  if(_deleteStep===1){
    btn.innerText="\u26a0\ufe0f Are you sure?";
    btn.style.background="#b8360b";
    clearTimeout(_deleteTimer);
    _deleteTimer=setTimeout(()=>{_deleteStep=0;if(btn){btn.innerText="\U0001f5d1 Delete Progress";btn.style.background="#6b2b2b";}},4000);
  } else if(_deleteStep===2){
    btn.innerText="\U0001f525 Are you REALLY sure?";
    btn.style.background="#8b0000";
    clearTimeout(_deleteTimer);
    _deleteTimer=setTimeout(()=>{_deleteStep=0;if(btn){btn.innerText="\U0001f5d1 Delete Progress";btn.style.background="#6b2b2b";}},4000);
  } else {
    clearTimeout(_deleteTimer); _deleteStep=0;
    localStorage.removeItem("cubeBattle_progress");
    Object.keys(masteryProgress).forEach(k=>masteryProgress[k]=0);
    Object.keys(masteryUnlocked).forEach(k=>masteryUnlocked[k]=false);
    Object.keys(shopOwned).forEach(k=>shopOwned[k]=false);
    easterEggs=0; updateEggDisplay();
    if(btn){btn.innerText="\u2705 Progress Deleted!"; btn.style.background="#2a7a2a";}
    setTimeout(()=>{if(btn){btn.innerText="\U0001f5d1 Delete Progress"; btn.style.background="#6b2b2b";}},2000);
  }
}


// ===== REPLAY SYSTEM =====
let replayFrames=[];
let replayRecording=false;
let replayFrameCount=0;
let replayBattleStart=0;
const REPLAY_SKIP=3;         // record every 3rd frame (~20fps)
const MAX_REPLAY_FRAMES=2400; // cap at 2400 frames (~2 min)
let _replayTab='recent';

function captureCubeState(cube){
  return {
    x:Math.round(cube.x),y:Math.round(cube.y),hp:cube.hp,s:cube.s,c:cube.c,
    t:cube.t,m:cube.mastered,angle:+(cube.angle.toFixed(2)),
    da:cube.dashActive||false,
    drain:cube.drainActive||false,
    stop:cube.stopActive||false,
    swap:cube.swapActive||false,
    swapB:cube.swapBoostActive||false,
    ms:cube.masteryShield||0,
    pm:cube.predMode||'scared',
    es:cube.evolveStage||1,
    rb:cube.rebirthFlash?((Date.now()-cube.rebirthFlash)<600):false,
    tr:(cube.trail||[]).slice(-6).map(t=>({x:Math.round(t.x),y:Math.round(t.y)}))
  };
}

function captureFrame(){
  if(!replayRecording||!p||!o)return;
  replayFrameCount++;
  if(replayFrameCount%REPLAY_SKIP!==0)return;
  if(replayFrames.length>=MAX_REPLAY_FRAMES)return;
  replayFrames.push({
    p:captureCubeState(p),
    o:captureCubeState(o),
    cl:clones.filter(cl=>cl.hp>0).map(cl=>({x:Math.round(cl.x),y:Math.round(cl.y),s:cl.s,c:cl.c,hp:cl.hp,angle:+(cl.angle.toFixed(2))})),
    eg:eggs.filter(eg=>eg.alive).map(eg=>({x:Math.round(eg.x),y:Math.round(eg.y),hp:eg.hp,prog:+((Date.now()-eg.spawnTime)/5000).toFixed(2)})),
    ht:hatchlings.filter(ht=>ht.hp>0).map(ht=>({x:Math.round(ht.x),y:Math.round(ht.y),s:ht.s,c:ht.c,hp:ht.hp,t:ht.t,angle:+(ht.angle.toFixed(2))}))
  });
}

function saveReplayToStorage(result){
  if(replayFrames.length<15)return;
  let dur=Math.round((Date.now()-replayBattleStart)/1000);
  let replay={
    id:Date.now(),
    ts:Date.now(),
    player:selectedPlayer,
    pm:playerMastered,
    enemy:selectedEnemy,
    em:enemyMastered,
    result:result,
    dur:dur,
    frames:replayFrames.slice()
  };
  let replays=loadReplayList();
  replays.unshift(replay);
  if(replays.length>5)replays=replays.slice(0,5);
  try{localStorage.setItem('cubeBattle_replays',JSON.stringify(replays));}catch(e){console.warn('Replay save failed',e);}
}

function loadReplayList(){
  try{let r=localStorage.getItem('cubeBattle_replays');return r?JSON.parse(r):[];}catch(e){return[];}
}

function loadFavorites(){
  try{let r=localStorage.getItem('cubeBattle_favs');return r?JSON.parse(r):[];}catch(e){return[];}
}

function toggleFavorite(id){
  let favs=loadFavorites();
  let idx=favs.findIndex(f=>f.id===id);
  if(idx>=0){
    favs.splice(idx,1);
    try{localStorage.setItem('cubeBattle_favs',JSON.stringify(favs));}catch(e){}
  } else {
    let all=[...loadReplayList(),...favs];
    let r=all.find(r=>r.id===id);
    if(!r)return;
    // avoid dupes
    if(!favs.find(f=>f.id===id)) favs.unshift(r);
    try{localStorage.setItem('cubeBattle_favs',JSON.stringify(favs));}catch(e){}
  }
  renderReplayList();
}

function openReplays(){
  _replayTab='recent';
  document.getElementById('rtab-recent').className='rtab active';
  document.getElementById('rtab-fav').className='rtab';
  renderReplayList();
  document.getElementById('replay-panel').classList.add('open');
}
function closeReplays(){document.getElementById('replay-panel').classList.remove('open');}

function switchReplayTab(tab){
  _replayTab=tab;
  document.getElementById('rtab-recent').className='rtab'+(tab==='recent'?' active':'');
  document.getElementById('rtab-fav').className='rtab'+(tab==='favorites'?' active':'');
  renderReplayList();
}

function renderReplayList(){
  let list=document.getElementById('replay-list');
  list.innerHTML='';
  let favs=loadFavorites();
  let favIds=new Set(favs.map(f=>f.id));
  let items=_replayTab==='recent'?loadReplayList():favs;
  if(items.length===0){
    list.innerHTML='<div class="rcard-empty">'+(
      _replayTab==='recent'?'No replays yet.<br>Play some battles to record them!':'No favorites yet.<br>Star a replay to save it here!'
    )+'</div>';
    return;
  }
  items.forEach(r=>{
    let isFav=favIds.has(r.id);
    let resultEmoji=r.result==='player'?'🏆 Player Wins':r.result==='enemy'?'💀 Enemy Wins':'🤝 Tie';
    let pName=(r.pm?'⭐':'')+r.player;
    let eName=(r.em?'⭐':'')+r.enemy;
    let dateStr=new Date(r.ts).toLocaleString();
    let card=document.createElement('div');
    card.className='rcard';
    card.innerHTML=`
      <div class="rcard-top">
        <div class="rcard-title">${pName} vs ${eName}</div>
        <div style="font-size:12px;white-space:nowrap">${resultEmoji}</div>
      </div>
      <div class="rcard-meta">${dateStr} &middot; ${r.dur}s &middot; ${r.frames.length} frames</div>
      <div class="rcard-btns">
        <button class="rbtn-watch" onclick="watchReplay(${r.id})">▶ Watch</button>
        <button class="${isFav?'rbtn-unfav':'rbtn-fav'}" onclick="toggleFavorite(${r.id})">${isFav?'★ Unfavorite':'☆ Favorite'}</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function watchReplay(id){
  let allReplays=[...loadReplayList(),...loadFavorites()];
  // deduplicate
  let seen=new Set(),deduped=[];
  for(let r of allReplays){if(!seen.has(r.id)){seen.add(r.id);deduped.push(r);}}
  let replay=deduped.find(r=>r.id===id);
  if(!replay){alert('Replay not found!');return;}
  let html=buildReplayHTML(replay);
  let blob=new Blob([html],{type:'text/html'});
  let url=URL.createObjectURL(blob);
  window.open(url,'_blank');
}

function buildReplayHTML(replay){
  let pName=(replay.pm?'⭐':'')+replay.player;
  let eName=(replay.em?'⭐':'')+replay.enemy;
  let resultText=replay.result==='player'?'🏆 Player Wins!':replay.result==='enemy'?'💀 Enemy Wins!':'🤝 It\'s a Tie!';
  let resultColor=replay.result==='player'?'#27ae60':replay.result==='enemy'?'#e74c3c':'#aaa';
  let dateStr=new Date(replay.ts).toLocaleString();
  let frameJson=JSON.stringify(replay.frames);

  return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cube Battle Replay</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#1a1a2e;color:#fff;text-align:center;font-family:Arial,sans-serif;padding:12px 8px}
h2{margin:8px 0 4px;font-size:20px;color:#4a9eff}
.subtitle{font-size:14px;color:#aaa;margin:2px 0}
#result{font-size:18px;font-weight:bold;margin:6px 0;color:${resultColor}}
canvas{background:#2a2a3a;display:block;margin:10px auto;border-radius:6px;border:2px solid #3a3a5a;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
#controls{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;margin:8px 0}
#controls button{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:bold}
#btn-pp{background:#27ae60;color:#fff;min-width:80px}
#btn-pp:hover{background:#2ecc71}
#btn-restart{background:#555;color:#fff}
#btn-restart:hover{background:#777}
input[type=range]{width:260px;cursor:pointer;accent-color:#4a9eff}
#frame-info{font-size:12px;color:#7ab;min-width:90px;text-align:left}
.speed-row{display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap;margin:4px 0}
.sp{padding:5px 11px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold;background:#2a3a4a;color:#aaa;border:1px solid #3a4a5a}
.sp:hover{background:#3a4a5a;color:#fff}
.sp.on{background:#4a9eff;color:#fff;border-color:#4a9eff}
#meta{font-size:11px;color:#556;margin-top:8px}
</style>
</head>
<body>
<button onclick="window.close()" style="position:fixed;top:12px;left:14px;z-index:100;background:#2a2a3a;color:#9bc;border:1px solid #445;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:bold;">← Back</button>
<h2>⚔️ Cube Battle Replay</h2>
<div class="subtitle">${pName} <span style="color:#555">vs</span> ${eName}</div>
<div id="result">${resultText}</div>
<canvas id="c" width="360" height="360"></canvas>
<div id="controls">
  <button id="btn-pp" onclick="togglePlay()">⏸ Pause</button>
  <input type="range" id="scrub" min="0" value="0" oninput="scrubTo(this.value)">
  <div id="frame-info">1 / 0</div>
</div>
<div class="speed-row">
  <span style="font-size:12px;color:#7ab">Speed:</span>
  <button class="sp" id="sp1" onclick="setSpeed(1)">0.5×</button>
  <button class="sp on" id="sp2" onclick="setSpeed(2)">1×</button>
  <button class="sp" id="sp4" onclick="setSpeed(4)">2×</button>
  <button id="btn-restart" onclick="restartReplay()" style="padding:5px 11px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:bold;background:#333;color:#aaa;border:1px solid #444">⏮ Restart</button>
</div>
<div id="meta">${dateStr} &middot; ${replay.dur}s battle</div>
<script>
const frames=${frameJson};
const canv=document.getElementById('c');
const ctx=canv.getContext('2d');
let curFrame=0,playing=true,speed=2;
let lastTs=0,frameDur=50;

const scrub=document.getElementById('scrub');
scrub.max=Math.max(0,frames.length-1);

function setSpeed(s){
  speed=s;
  ['sp1','sp2','sp4'].forEach(id=>{let el=document.getElementById(id);if(el)el.className='sp';});
  let map={1:'sp1',2:'sp2',4:'sp4'};
  if(map[s]){let el=document.getElementById(map[s]);if(el)el.className='sp on';}
}

function togglePlay(){
  playing=!playing;
  document.getElementById('btn-pp').innerText=playing?'⏸ Pause':'▶ Play';
  document.getElementById('btn-pp').style.background=playing?'#27ae60':'#2980b9';
  if(playing) requestAnimationFrame(tick);
}

function restartReplay(){
  curFrame=0; playing=true;
  document.getElementById('btn-pp').innerText='⏸ Pause';
  document.getElementById('btn-pp').style.background='#27ae60';
  requestAnimationFrame(tick);
}

function scrubTo(v){
  curFrame=parseInt(v);
  if(frames[curFrame]) drawFrame(frames[curFrame]);
  document.getElementById('frame-info').innerText=(curFrame+1)+' / '+frames.length;
}

function tick(ts){
  if(!playing) return;
  if(!lastTs||ts-lastTs>=frameDur/speed){
    lastTs=ts;
    if(frames[curFrame]) drawFrame(frames[curFrame]);
    scrub.value=curFrame;
    document.getElementById('frame-info').innerText=(curFrame+1)+' / '+frames.length;
    curFrame++;
    if(curFrame>=frames.length){
      curFrame=frames.length-1;
      playing=false;
      document.getElementById('btn-pp').innerText='▶ Play';
      document.getElementById('btn-pp').style.background='#2980b9';
      return;
    }
  }
  requestAnimationFrame(tick);
}

function drawFrame(f){
  ctx.clearRect(0,0,360,360);
  ctx.fillStyle='#2a2a3a';ctx.fillRect(0,0,360,360);
  // subtle grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  for(let i=40;i<360;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,360);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(360,i);ctx.stroke();}

  // Eggs
  for(let e of f.eg||[]){
    ctx.save();
    let pulse=e.prog>0.8?(0.5+0.5*Math.sin(Date.now()/70)):1;
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#ffe082';ctx.beginPath();ctx.ellipse(e.x,e.y,9,11.25,0,0,Math.PI*2);ctx.fill();
    if(e.hp<=1){ctx.strokeStyle='#795548';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(e.x-2,e.y-4);ctx.lineTo(e.x+2,e.y);ctx.lineTo(e.x-1,e.y+4);ctx.stroke();}
    ctx.globalAlpha=1;
    let prog=1-Math.min(1,Math.max(0,e.prog));
    ctx.fillStyle='#222';ctx.fillRect(e.x-9,e.y+13,18,3);
    ctx.fillStyle='#4caf50';ctx.fillRect(e.x-9,e.y+13,18*prog,3);
    ctx.restore();
  }

  // Clones
  for(let cl of f.cl||[]){
    ctx.save();ctx.globalAlpha=0.78;
    ctx.fillStyle=cl.c;ctx.fillRect(cl.x-cl.s/2,cl.y-cl.s/2,cl.s,cl.s);
    ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
    ctx.strokeRect(cl.x-cl.s/2,cl.y-cl.s/2,cl.s,cl.s);ctx.restore();
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='8px Arial';ctx.textAlign='center';
    ctx.fillText('clone',cl.x,cl.y-cl.s/2-2);ctx.textAlign='left';
  }

  // Hatchlings
  for(let h of f.ht||[]){
    if(h.t==='Stick'){
      let len=26,sx=h.x+Math.cos(h.angle)*len,sy=h.y+Math.sin(h.angle)*len;
      ctx.strokeStyle='yellow';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(h.x,h.y);ctx.lineTo(sx,sy);ctx.stroke();
    }
    ctx.save();ctx.globalAlpha=0.88;
    ctx.fillStyle=h.c;ctx.fillRect(h.x-h.s/2,h.y-h.s/2,h.s,h.s);
    ctx.strokeStyle='rgba(255,159,197,0.9)';ctx.lineWidth=1.5;ctx.setLineDash([2,2]);
    ctx.strokeRect(h.x-h.s/2,h.y-h.s/2,h.s,h.s);ctx.restore();
    ctx.fillStyle='rgba(255,255,255,0.75)';ctx.font='7px Arial';ctx.textAlign='center';
    ctx.fillText(h.t.substring(0,3),h.x,h.y-h.s/2-2);
    ctx.fillStyle='#fff';ctx.font='8px Arial';
    ctx.fillText(h.hp+'hp',h.x,h.y+4);ctx.textAlign='left';
  }

  // Main cubes (player behind enemy)
  drawCubeR(f.p);
  drawCubeR(f.o);
}

function drawCubeR(cb){
  if(!cb)return;
  ctx.setLineDash([]);

  // Zigzag/trail
  if(cb.t==='Zigzag'&&cb.tr&&cb.tr.length>1){
    ctx.save();
    ctx.strokeStyle=cb.m?'rgba(255,215,0,0.5)':'rgba(0,255,153,0.5)';
    ctx.lineWidth=3;ctx.shadowColor=cb.m?'#ffd700':'#00ff99';ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(cb.tr[0].x,cb.tr[0].y);
    for(let i=1;i<cb.tr.length;i++)ctx.lineTo(cb.tr[i].x,cb.tr[i].y);
    ctx.stroke();ctx.restore();
  }

  // Swapper glow
  if(cb.swap){
    ctx.save();ctx.strokeStyle='rgba(255,111,0,0.9)';ctx.lineWidth=3;
    ctx.shadowColor='#ff6f00';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+8,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  if(cb.swapB){
    ctx.save();ctx.strokeStyle='rgba(255,215,0,0.95)';ctx.lineWidth=4;
    ctx.shadowColor='#ffd700';ctx.shadowBlur=22;
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+14,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  // Stopper ring
  if(cb.stop){
    ctx.save();ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=4;
    ctx.shadowColor='#fff';ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+12,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText('STOP',cb.x,cb.y+4);ctx.textAlign='left';ctx.restore();
  }

  // Predictor ring
  if(cb.t==='Predictor'){
    ctx.save();
    if(cb.pm==='scared'){
      ctx.strokeStyle='rgba(255,255,100,0.7)';ctx.lineWidth=3;ctx.shadowColor='#ffff66';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+11,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(255,255,100,0.9)';ctx.font='bold 11px Arial';ctx.textAlign='center';
      ctx.fillText('Scared!',cb.x,cb.y-cb.s/2-16);
    } else {
      ctx.strokeStyle='rgba(200,80,255,0.7)';ctx.lineWidth=3;ctx.shadowColor='#cc44ff';ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+11,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='rgba(200,80,255,0.9)';ctx.font='bold 11px Arial';ctx.textAlign='center';
      ctx.fillText('Predicting...',cb.x,cb.y-cb.s/2-16);
    }
    ctx.textAlign='left';ctx.restore();
  }

  // Evolver stage label
  if(cb.t==='Evolver'){
    let stageColors=['','#43a047','#7cb342','#f9a825','#e64a19','#b71c1c'];
    cb.c=stageColors[cb.es]||cb.c;
    if(cb.es===5){ctx.save();ctx.shadowColor='#f44336';ctx.shadowBlur=22;ctx.fillStyle=cb.c;ctx.fillRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);ctx.restore();}
    let sl=['','S1','S2','S3','S4','*S5'];
    ctx.fillStyle=cb.es===5?'#ffd700':'#fff';ctx.font='bold '+(cb.es===5?'12':'10')+'px Arial';ctx.textAlign='center';
    ctx.fillText(sl[cb.es],cb.x,cb.y-cb.s/2-18);ctx.textAlign='left';
  }

  // Rebirth flash
  if(cb.t==='Rebirth'&&cb.rb){
    ctx.save();ctx.globalAlpha=0.45;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s*1.2,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  // Mastered glow + cube body
  if(cb.m){
    ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=16;
    ctx.fillStyle=cb.c;ctx.fillRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);ctx.restore();
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.strokeRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);
  } else {
    ctx.fillStyle=cb.c;ctx.fillRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);
  }

  // Normal mastery shield bubble
  if(cb.t==='Normal'&&cb.m&&cb.ms>0){
    ctx.save();ctx.strokeStyle='rgba(255,215,0,0.85)';ctx.lineWidth=3;
    ctx.shadowColor='#ffd700';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(cb.x,cb.y,cb.s/2+9,0,Math.PI*2);ctx.stroke();ctx.restore();
  }

  // Stick
  if(cb.t==='Stick'){
    let len=70,sx=cb.x+Math.cos(cb.angle)*len,sy=cb.y+Math.sin(cb.angle)*len;
    ctx.strokeStyle=cb.m?'#ffd700':'yellow';ctx.lineWidth=5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(cb.x,cb.y);ctx.lineTo(sx,sy);ctx.stroke();
  }

  // Shield arc
  if(cb.t==='Shield'){
    ctx.strokeStyle=cb.m?'#ffd700':'cyan';ctx.lineWidth=10;ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(cb.x,cb.y,55,cb.angle-0.7,cb.angle+0.7);ctx.stroke();
  }

  // Dash flash
  ctx.setLineDash([]);
  if(cb.da){ctx.strokeStyle='white';ctx.lineWidth=3;ctx.strokeRect(cb.x-cb.s/2,cb.y-cb.s/2,cb.s,cb.s);}

  // HP label
  ctx.fillStyle='#fff';ctx.font='12px Arial';ctx.setLineDash([]);
  ctx.fillText((cb.m?'\\u2B50':'')+cb.t+' '+cb.hp,cb.x-22,cb.y-cb.s/2-5);
}

// Start playback
if(frames.length>0){drawFrame(frames[0]);}
requestAnimationFrame(tick);
<\/script>
</body>
</html>`;
}
